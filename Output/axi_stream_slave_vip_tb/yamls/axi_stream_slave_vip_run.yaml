# EDA Buddy Runtime Config (Auto-Generated)
runtime:
  common_args:
  - +UVM_VERBOSITY=UVM_MEDIUM
  - +UVM_MAX_QUIT_COUNT=10
  - +UVM_TIMEOUT=100000000
  tool_args:
    vcs:
    - -l simv.log
    questa:
    - -batch
    - -do 'run -all; quit'
  debug:
    gui_mode: false
    dump_waves: true
    wave_format: fsdb
    quiet_sim: true
