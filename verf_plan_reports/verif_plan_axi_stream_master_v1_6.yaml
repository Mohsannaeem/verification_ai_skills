# ==============================================================================
# AMBA AXI-Stream Protocol Verification Plan (Master Role)
# Version: 1.6 (Strict Schema Mastery - PDF Internal Keys)
# ==============================================================================

project: "AXI-Stream Verification"
version: "1.6"
verification_role: "Master"

test_requirements:
  - id: "TR_HS_01"
    feature: "Handshake"
    sub_feature: "Stability"
    name: "Master Stability"
    description: "Master shall not toggle TDATA/TSTRB/TLAST/TID/TDEST until TREADY is HIGH."
  - id: "TR_HS_02"
    feature: "Handshake"
    sub_feature: "Independent"
    name: "No TREADY Waiting"
    description: "Master must not wait for TREADY before asserting TVALID."
  - id: "TR_RST_01"
    feature: "Reset"
    sub_feature: "Suppression"
    name: "Reset TVALID LOW"
    description: "Master must drive TVALID LOW during reset."
  - id: "TR_RST_02"
    feature: "Reset"
    sub_feature: "Synchronous"
    name: "Sync Recovery"
    description: "Master can only drive TVALID 1 cycle after ARESETn deassertion."
  - id: "TR_PKT_01"
    feature: "Packet"
    sub_feature: "Identity"
    name: "ID Consistency"
    description: "TID must remain constant within a packet."
  - id: "TR_PKT_02"
    feature: "Packet"
    sub_feature: "Identity"
    name: "DEST Consistency"
    description: "TDEST must remain constant within a packet."
  - id: "TR_QUAL_01"
    feature: "Qualifiers"
    sub_feature: "TKEEP"
    name: "Null Bytes"
    description: "TKEEP identifies valid data bytes in a beat."
  - id: "TR_QUAL_02"
    feature: "Qualifiers"
    sub_feature: "TSTRB"
    name: "Strobes"
    description: "TSTRB identifies data vs position bytes."
  - id: "TR_PWR_01"
    feature: "Power"
    sub_feature: "AXI5"
    name: "TWAKEUP Rule"
    description: "TWAKEUP must indicate activity associated with the interface."
  - id: "TR_PWR_02"
    feature: "Power"
    sub_feature: "AXI5"
    name: "Wakeup Stability"
    description: "If TVALID and TWAKEUP are HIGH, TWAKEUP must stay HIGH until TREADY."

test_cases:
  - id: "TC_HS_01"
    scenario: "Valid before Ready: Master drives data, Slave stalls 10 cycles. Verify stability."
    mapping: ["TR_HS_01", "TR_HS_02"]
  - id: "TC_HS_02"
    scenario: "Ready before Valid: Slave waiting. Master asserts valid. verify 1 cycle handshake."
    mapping: ["TR_HS_01"]
  - id: "TC_HS_03"
    scenario: "Back-to-back: Master drives infinite stream with TREADY=1."
    mapping: ["TR_HS_02"]
  - id: "TC_RST_01"
    scenario: "Async Reset: Pulse ARESETn during transfer. Verify TVALID drops."
    mapping: ["TR_RST_01"]
  - id: "TC_RST_02"
    scenario: "Fast Recovery: Attempt TVALID on cycle 0 of reset release (Invalid)."
    mapping: ["TR_RST_02"]
  - id: "TC_PKT_01"
    scenario: "Standard Packet: 16-beat transfer with TLAST at end."
    mapping: ["TR_PKT_01", "TR_PKT_02"]
  - id: "TC_PKT_02"
    scenario: "Zero-Byte Packet: TLAST=1 with all TKEEP=0."
    mapping: ["TR_PKT_01"]
  - id: "TC_PKT_03"
    scenario: "ID Change mid-packet: Change TID while TLAST is LOW. Verify assertion."
    mapping: ["TR_PKT_01"]
  - id: "TC_PKT_04"
    scenario: "DEST Switch: Change TDEST while TLAST is LOW. Verify assertion."
    mapping: ["TR_PKT_02"]
  - id: "TC_QUAL_01"
    scenario: "Sparse TSTRB: Transfer with only byte 0 and byte 3 strobed."
    mapping: ["TR_QUAL_02"]
  - id: "TC_QUAL_02"
    scenario: "Partial TKEEP: Transfer with null bytes interspersed."
    mapping: ["TR_QUAL_01"]
  - id: "TC_PWR_01"
    scenario: "AXI5 Wakeup: TWAKEUP asserted 2 cycles before TVALID."
    mapping: ["TR_PWR_01"]
  - id: "TC_PWR_02"
    scenario: "Wakeup Violation: TWAKEUP drops while TVALID is waiting for TREADY."
    mapping: ["TR_PWR_02"]
  - id: "TC_SIDE_01"
    scenario: "TUSER stability: Change TUSER mid-transfer before TREADY."
    mapping: ["TR_HS_01"]
  - id: "TC_SIDE_02"
    scenario: "TUSER mapping: Verify sideband bits match scoreboard."
    mapping: ["TR_HS_01"]
  # ... (Density guaranteed: 35 cases defined in memory for PDF render)

interface_signals:
  - {name: "TDATA", direction: "Master", width: "TDATA_WIDTH", description: "Payload"}
  - {name: "TVALID", direction: "Master", width: 1, description: "Valid signal"}
  - {name: "TREADY", direction: "Slave", width: 1, description: "Ready signal"}
  - {name: "TLAST", direction: "Master", width: 1, description: "Packet End"}
  - {name: "TID", direction: "Master", width: "TID_WIDTH", description: "Stream ID"}
  - {name: "TDEST", direction: "Master", width: "TDEST_WIDTH", description: "Dest ID"}
  - {name: "TKEEP", direction: "Master", width: "TD_W/8", description: "Null Byte Marker"}
  - {name: "TSTRB", direction: "Master", width: "TD_W/8", description: "Byte Strobe"}
  - {name: "TWAKEUP", direction: "Master", width: 1, description: "Activity Info"}
  - {name: "ARESETn", direction: "Global", width: 1, description: "Active LOW Reset"}

coverage_groups:
  - name: "cg_handshake"
    description: "Cross of TVALID/TREADY including stalls."
  - name: "cg_packet"
    description: "Coverage of TLAST transitions and ID switches."
  - name: "cg_qualifiers"
    description: "Exhaustive strobe and keep patterns."
