project: "AXI-Stream Slave VIP Verification Plan — VIP as Receiver (Slave), DUT as Transmitter (Master)"
version: "1.0"
verification_role: "Slave"
protocol_version: "AXI4/5-Stream (ARM IHI 0051B, Issue B)"

configurations:
  - feature: "Back-Pressure Control"
    name: "VIP-Driven TREADY Modulation"
    impact: |
      The Slave VIP (Receiver) is the sole source of TREADY stimulus. The VIP must be capable
      of asserting TREADY immediately (zero-wait-state), deferring TREADY by a configurable
      number of cycles (back-pressure injection), and toggling TREADY at programmable duty
      cycles. Every TREADY state change exercises a different DUT Master behavioral branch: the
      DUT must hold TVALID and all payload signals stable during any TVALID=1/TREADY=0 window,
      per Section 2.2 of the specification.

  - feature: "TVALID Stability Enforcement"
    name: "Transmitter TVALID Non-Retraction Rule"
    impact: |
      The specification mandates that a Transmitter (DUT Master) must not retract TVALID once
      asserted (Section 2.2, p.2-18). This is one of the most critical protocol obligations, as
      a premature TVALID deassertion can silently corrupt the receiver's internal state machine
      without triggering a visible handshake error. The Slave VIP's monitor must perform
      cycle-accurate tracking of TVALID from first assertion through handshake completion to
      detect any mid-window deassertion.

  - feature: "Payload Stability Verification"
    name: "TDATA/TKEEP/TSTRB/TLAST/TID/TDEST Hold Invariant"
    impact: |
      The specification requires that all payload-bearing signals remain bit-stable from the
      cycle TVALID is first asserted until the handshake occurs. The Slave VIP's monitor must
      capture a bit-snapshot of all payload signals on the first TVALID=1 cycle and compare
      it against every subsequent cycle within the pending window. Any transient mutation
      detected before TREADY is asserted constitutes a critical DUT Master fidelity violation.

  - feature: "AXI5 Parity Compliance"
    name: "Bidirectional Parity — VIP Drives TREADYCHK, DUT Drives TDATACHK/TVALIDCHK/TLASTCHK"
    impact: |
      The Slave VIP must generate TREADYCHK (odd parity on TREADY) per Table 5-1, p.5-48.
      Simultaneously, the monitor independently computes expected parity for all DUT-driven check
      signals (TDATACHK, TVALIDCHK, TLASTCHK, TWAKEUPCHK) and flags any discrepancy. This dual
      responsibility — generating its own check signal and verifying the DUT's — makes parity
      coverage bidirectional and complete.

  - feature: "Reset Protocol Conformance"
    name: "DUT Master TVALID Suppression During ARESETn"
    impact: |
      The specification mandates that TVALID must be driven LOW during reset and that the DUT
      Master must not assert TVALID until the first rising ACLK edge following ARESETn deassertion
      (Section 2.8.2, p.2-28). The Slave VIP's monitor must track ARESETn and flag any premature
      TVALID assertion. Mid-transfer reset injection tests the DUT's ability to abort in-flight
      transfers gracefully without residual state.

  - feature: "TWAKEUP Timing (AXI5)"
    name: "Transmitter TWAKEUP Pre-TVALID Assertion Protocol"
    impact: |
      The specification recommends TWAKEUP assertion at least one cycle before TVALID (Section 2.3,
      p.2-20). If asserted simultaneously with TVALID, TWAKEUP must persist until TREADY is
      asserted. The Slave VIP may legally gate TREADY until TWAKEUP is observed, creating a
      potential deadlock if TWAKEUP is absent. Verification must exercise the recommended timing,
      the permissible simultaneous case, and the degenerate case where TWAKEUP toggles without
      a subsequent transfer.

  - feature: "TID/TDEST Stream Isolation"
    name: "Multi-Stream In-Order Delivery Verification"
    impact: |
      Interleaving of transfers across distinct TID/TDEST pairs is permitted on a per-transfer
      basis (Section 2.7, p.2-27). Within any given stream (unique TID+TDEST pair), transfer
      ordering must be preserved. The Slave VIP scoreboard must maintain per-stream receive queues
      keyed by TID+TDEST and independently verify in-order arrival for each active stream. The
      monitor must flag any observable reordering as a fatal ordering violation.

  - feature: "Continuous Packets Mode"
    name: "Continuous_Packets Property Structural Constraints"
    impact: |
      When Continuous_Packets=True, the DUT Master must hold TID/TDEST stable while TLAST=0,
      must not include TSTRB, and must assert all TKEEP bits HIGH for mid-packet beats (Section
      3.3, p.3-38). The Slave VIP protocol monitor must enforce these constraints in real-time
      and flag any mid-packet TID mutation, null byte insertion, or TSTRB presence as a
      conformance failure.

