code_snippets:
- title: axi_stream_master_vip_defines.sv (Architecture Blueprint)
  code: |
    COMPONENT: Global Preprocessor Defines
    MEMBERS:
      - `define AXI_DATA_WIDTH       64
      - `define AXI_STRB_WIDTH       (AXI_DATA_WIDTH/8)
      - `define AXI_TID_WIDTH        8
      - `define AXI_TDEST_WIDTH      4
      - `define AXI_TUSER_WIDTH      8
      - `define HAS_TKEEP            1
      - `define HAS_TSTRB            1
      - `define HAS_TLAST            1
      - `define HAS_TID              1
      - `define HAS_TDEST            1
      - `define HAS_TUSER            1
      - `define HAS_TWAKEUP          1
      - `define HAS_PARITY           1
      - `define AXI_MAX_PACKET_BEATS 256
      - `define UVM_TIMEOUT_NS       100000000
    NOTES:
      - All architectural widths sourced from these defines for global visibility.
      - HAS_* flags drive conditional compilation in driver and monitor.

- title: axi_stream_master_vip_seq_item.sv (Architecture Blueprint)
  code: |
    COMPONENT: axi_stream_master_vip_seq_item
    EXTENDS: uvm_sequence_item
    MEMBERS:
      - [rand logic [AXI_DATA_WIDTH-1:0]]   tdata
      - [rand logic [AXI_STRB_WIDTH-1:0]]   tstrb
      - [rand logic [AXI_STRB_WIDTH-1:0]]   tkeep
      - [rand logic]                          tlast
      - [rand logic [AXI_TID_WIDTH-1:0]]    tid
      - [rand logic [AXI_TDEST_WIDTH-1:0]]  tdest
      - [rand logic [AXI_TUSER_WIDTH-1:0]]  tuser
      - [rand int unsigned]                   tready_delay  (0..15 cycles)
      - [rand int unsigned]                   packet_length (1..256 beats)
      - [bit]                                 drop_valid_early (violation knob)
      - [bit]                                 inject_invalid_tstrb_tkeep (violation knob)
      - [bit]                                 change_tid_mid_packet (violation knob)
      - [bit]                                 parity_inject_error (violation knob)
      - [int]                                 parity_error_byte_idx
    CONSTRAINTS:
      - tkeep != 0 unless drop_valid_early=1 (structural constraint)
      - tstrb == 0 when tkeep == 0 (null byte law)
      - tstrb[x] == 0 when tkeep[x] == 0 (per-bit position law, unless inject_invalid=1)
      - packet_length inside {1, [2:8], [9:64], [65:256]}
      - tready_delay inside {0, [1:5], [6:20], [21:100]}
    METHODS:
      - do_copy: deep copy all rand fields and all violation knobs
      - do_compare: compare tdata, tstrb, tkeep, tlast, tid, tdest, tuser only
      - convert2string: multi-line formatted dump of all fields

- title: axi_stream_master_vip_agent_config.sv (Architecture Blueprint)
  code: |
    COMPONENT: axi_stream_master_vip_agent_config
    EXTENDS: uvm_object
    MEMBERS:
      - [virtual axi_stream_master_vip_if]  vif
      - [uvm_active_passive_enum]           is_active = UVM_ACTIVE
      - [bit]                               enable_parity = 1
      - [bit]                               continuous_packets_mode = 0
      - [bit]                               has_twakeup = 1
      - [int]                               max_packet_beats = 256
      - [int]                               tready_max_stall = 100
      - [bit]                               enable_protocol_checks = 1
    NOTES:
      - Fetched via uvm_config_db in build_phase of agent.
      - All HAS_* macros map to corresponding config knobs for dynamic control.

- title: axi_stream_master_vip_driver.sv (Architecture Blueprint)
  code: |
    COMPONENT: axi_stream_master_vip_driver
    EXTENDS: uvm_driver #(axi_stream_master_vip_seq_item)
    CONFIG_REF: axi_stream_master_vip_agent_config (Source: ConfigDB)
    MEMBERS:
      - [virtual axi_stream_master_vip_if] vif
      - [axi_stream_master_vip_agent_config] cfg
      - [int] packet_count
    METHODS:
      - build_phase: get cfg from ConfigDB, get vif from cfg
      - run_phase/body:
          LOOP forever:
            seq_item_port.get_next_item(req)
            CALL drive_packet(req)
            seq_item_port.item_done()
      - drive_packet(item):
          FOR beat = 1 to item.packet_length:
            @(posedge vif.ACLK);
            vif.TVALID <= 1
            vif.TDATA  <= item.tdata (beat-specific randomization)
            vif.TSTRB  <= item.tstrb
            vif.TKEEP  <= item.tkeep
            vif.TLAST  <= (beat == item.packet_length) ? 1 : 0
            vif.TID    <= item.tid
            vif.TDEST  <= item.tdest
            vif.TUSER  <= item.tuser
            IF cfg.has_twakeup: drive_twakeup()
            IF cfg.enable_parity: compute_and_drive_parity()
            IF item.drop_valid_early AND beat==3: vif.TVALID <= 0 (violation path)
            IF item.inject_invalid_tstrb_tkeep: force illegal tstrb/tkeep combo
            WAIT for TREADY (monitor stall, up to cfg.tready_max_stall cycles)
          vif.TVALID <= 0
      - compute_and_drive_parity():
          TDATACHK[i] = ^vif.TDATA[8i+7:8i] ^ 1  (odd parity per byte)
          TVALIDCHK   = ^vif.TVALID ^ 1
          TLASTCHK    = ^vif.TLAST ^ 1
          TIDCHK, TDESTCHK, TUSERCHK, TWAKEUPCHK computed similarly

- title: axi_stream_master_vip_monitor.sv (Architecture Blueprint)
  code: |
    COMPONENT: axi_stream_master_vip_monitor
    EXTENDS: uvm_monitor
    CONFIG_REF: axi_stream_master_vip_agent_config (Source: ConfigDB)
    MEMBERS:
      - [virtual axi_stream_master_vip_if] vif
      - [uvm_analysis_port #(axi_stream_master_vip_seq_item)] ap
      - [int] beat_counter, packet_counter
      - [logic [AXI_DATA_WIDTH-1:0]] prev_tdata
    METHODS:
      - run_phase:
          LOOP forever:
            @(posedge vif.ACLK);
            IF ARESETn==0: reset_state(); continue
            IF TVALID==1:
              CHECK stability: IF TVALID was 1 last cycle AND handshake NOT complete:
                verify TDATA/TSTRB/TKEEP/TID/TDEST unchanged vs prev_tdata → else UVM_ERROR
              IF cfg.enable_parity: verify_parity_signals()
              IF TVALID==1 AND TREADY==1:
                capture beat into seq_item
                beat_counter++
                IF TLAST==1: broadcast packet to ap; packet_counter++; beat_counter=0
              save prev_tdata, prev_tvalid
      - verify_parity_signals():
          FOR each byte i: expected_datachk[i] = ^TDATA[8i+7:8i] ^ 1
          IF TDATACHK != expected_datachk: UVM_ERROR("TDATACHK_PARITY_ERROR")
          Verify TVALIDCHK, TLASTCHK, TIDCHK, TDESTCHK similarly
          Observe TREADYCHK from DUT: verify against ^TREADY^1
      - reset_state(): flush beat_counter, log MONITOR_RESET_FLUSH
      - write_packet_tracker_file(): log each completed packet to tracker CSV file

- title: axi_stream_master_vip_scoreboard.sv (Architecture Blueprint)
  code: |
    COMPONENT: axi_stream_master_vip_scoreboard
    EXTENDS: uvm_scoreboard
    MEMBERS:
      - [uvm_analysis_imp] master_ap_imp (receives from monitor)
      - [axi_stream_master_vip_seq_item queue [$]] expected_queue [tid] (associative by TID)
      - [int] pass_count, fail_count, null_packet_count
    METHODS:
      - write(item):
          Reconstruct packet payload from captured beats, excluding null bytes (TKEEP=0).
          Exclude position bytes (TSTRB=0 with TKEEP=1) from data comparison.
          Pop matching item from expected_queue[item.tid]
          Compare TDATA payload (byte-accurate), TID, TDEST, packet length
          IF mismatch: UVM_ERROR with detailed field-level diff
          IF item is null-terminator (all TKEEP=0, TLAST=1): log as null_packet, no payload compare
          Pass: pass_count++; Fail: fail_count++
      - check_phase: IF fail_count > 0: UVM_ERROR("REGRESSION FAILED: N failures")
      - flush_on_reset(): clear expected_queue, log SCOREBOARD_FLUSHED

- title: axi_stream_master_vip_base_sequence.sv (Architecture Blueprint)
  code: |
    COMPONENT: axi_stream_master_vip_base_sequence
    EXTENDS: uvm_sequence #(axi_stream_master_vip_seq_item)
    MEMBERS:
      - [int]  num_packets = 10
      - [int]  beats_per_packet = 8
      - [bit]  enable_interleaving = 0
      - [bit]  continuous_mode = 0
    METHODS:
      - body():
          REPEAT num_packets:
            req = axi_stream_master_vip_seq_item::type_id::create("req")
            start_item(req)
            assert(req.randomize() with { packet_length == beats_per_packet; })
            IF continuous_mode: req.tid = fixed_tid; req.tdest = fixed_tdest
            finish_item(req)

- title: axi_stream_master_vip_test_sequences.sv (Architecture Blueprint)
  code: |
    COMPONENT: One sequence class per test case TC_MST_001 through TC_MST_048
    NAMING: axi_stream_master_vip_tc_mst_<NNN>_seq extends axi_stream_master_vip_base_sequence
    EXAMPLES:
      axi_stream_master_vip_tc_mst_001_seq:
        body(): drive 1 single-beat packet, TREADY stall=0
      axi_stream_master_vip_tc_mst_004_seq:
        body(): enable drop_valid_early knob; drive 1 packet; expect monitor UVM_ERROR
      axi_stream_master_vip_tc_mst_027_seq:
        body(): generate 4-stream interleaved traffic, 8 beats per stream
      axi_stream_master_vip_tc_mst_045_seq:
        body(): enable parity_inject_error on beat 8; expect TDATACHK_PARITY_ERROR

- title: axi_stream_master_vip_test.sv (Architecture Blueprint)
  code: |
    COMPONENT: axi_stream_master_vip_base_test extends uvm_test
    COMPONENT: One test class per TC: axi_stream_master_vip_tc_mst_<NNN>_test
    NAMING: axi_stream_master_vip_tc_mst_001_test, ..., axi_stream_master_vip_tc_mst_048_test
    METHODS:
      - build_phase: create env; set agent_config via ConfigDB
      - run_phase: create and start the matching tc_mst_NNN_seq on the master sequencer
      - Each test maps 1:1 to its corresponding tc_mst_NNN_seq

