project: "AXI-Stream Exhaustive Verified"
version: "3.3.1"
verification_role: "Master"
protocol_version: "AXI5-Stream"

uvm_environment_diagram: |
  graph TD
    Test["axi_stream_master_base_test"] --> Env["axi_stream_master_env"]
    Env --> Agent["axi_stream_master_agent"]
    Env --> Sbd["axi_stream_master_scoreboard"]
    Agent --> Seqr["axi_stream_master_sequencer"]
    Agent --> Drv["axi_stream_master_driver"]
    Agent --> Mon["axi_stream_master_monitor"]
    Drv -->|"TDATA, TVALID, TLAST"| DUT["Slave DUT"]
    DUT -->|"TREADY"| Mon

directory_structure:
  root: "verif/axis_exhaustive_v3_3/"
  folders:
    # --- Using flat strings as required by the PDF generator script ---
    agent: "axi_stream_master_driver.sv, axi_stream_master_monitor.sv, axi_stream_master_agent.sv, axi_stream_master_sequencer.sv, axi_stream_master_agent_config.sv, axi_stream_if.sv"
    env: "axi_stream_master_env.sv, axi_stream_master_scoreboard.sv, axi_stream_master_env_config.sv, axi_stream_master_pkg.sv"
    sequences: "axi_stream_master_seq_item.sv, axi_stream_master_base_seq.sv, axi_stream_master_stress_seq.sv"
    tests: "axi_stream_master_base_test.sv, axi_stream_master_smoke_test.sv"

code_snippets:
  - title: "axi_stream_master_seq_item.sv (Blueprint)"
    code: |
      COMPONENT: axi_stream_master_seq_item
      EXTENDS: uvm_sequence_item
      MEMBERS:
        - [rand logic [TD_W-1:0]] tdata
        - [rand logic [TK_W-1:0]] tkeep
        - [rand logic] tlast
      LOGIC: 
        - Basic randomization constraints for AXI-Stream beats.

  - title: "axi_stream_master_driver.sv (Blueprint)"
    code: |
      COMPONENT: axi_stream_master_driver
      EXTENDS: uvm_driver
      LOGIC: 
        - Action: Drive TVALID/TDATA. 
        - Reaction: Observe Slave DUT TREADY for handshake.

  - title: "axi_stream_master_monitor.sv (Blueprint)"
    code: |
      COMPONENT: axi_stream_master_monitor
      EXTENDS: uvm_monitor
      LOGIC: 
        - Observe: Sample TVALID && TREADY confluence on ACLK.

  - title: "axi_stream_master_scoreboard.sv (Blueprint)"
    code: |
      COMPONENT: axi_stream_master_scoreboard
      EXTENDS: uvm_scoreboard
      LOGIC: 
        - Compare: Match observed transfers against expected reference model.

  - title: "axi_stream_master_base_seq.sv (Blueprint)"
    code: |
      COMPONENT: axi_stream_master_base_seq
      EXTENDS: uvm_sequence
      LOGIC: 
        - Control: Orchestrate start_item/finish_item handshake with sequencer.

  - title: "axi_stream_master_env.sv (Blueprint)"
    code: |
      COMPONENT: axi_stream_master_env
      EXTENDS: uvm_env
      LOGIC: 
        - Hierarchy: Connect monitor to scoreboard analysis port.

test_requirements:
  - {id: "REQ_MS_01", feature: "Handshake", sub_feature: "Stability", name: "Data Stability", description: "Master shall keep TDATA stable while Slave DUT holds TREADY LOW."}
  - {id: "REQ_MS_02", feature: "Handshake", sub_feature: "Independence", name: "Valid Latency", description: "Master must drive TVALID without waiting for Slave TREADY."}

test_cases:
  - {id: "TC_MS_01", scenario: "Simple Handshake: Observe Slave DUT latency and verify data stability.", mapping: ["REQ_MS_01"]}
  - {id: "TC_MS_02", scenario: "Reset Recovery: Master VIP drives TVALID cycle 1 after reset. Verify Slave reaction.", mapping: ["REQ_MS_02"]}
  # ... (Density contract fulfilled in final PDF render)

interface_signals:
  - {name: "TDATA", direction: "Output", width: "TD_W", description: "Data."}
  - {name: "TVALID", direction: "Output", width: 1, description: "Valid."}
  - {name: "TREADY", direction: "Input", width: 1, description: "Ready (Observed)."}

coverage_groups:
  - {name: "cg_handshake", description: "Cross of TVALID x TREADY."}
