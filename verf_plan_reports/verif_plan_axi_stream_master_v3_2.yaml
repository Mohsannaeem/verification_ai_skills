# ==============================================================================
# AMBA AXI-Stream Protocol Verification Plan (Master VIP Role)
# Version: 3.2 (Role-Safe Exhaustive - FROM SCRATCH)
# ==============================================================================

project: "AXI-Stream Enterprise v3.2"
version: "3.2"
verification_role: "Master"
protocol_version: "AXI5-Stream"

uvm_environment_diagram: |
  graph TD
    subgraph "UVM Master Testbench"
      Env["axis_env"]
      Agent["axis_agent"]
      Drv["axis_driver"]
      Mon["axis_monitor"]
      Sbd["axis_scoreboard"]
      Agent --> Drv
      Agent --> Mon
      Mon --> Sbd
    end
    Drv -->|"TDATA, TVALID, TLAST"| DUT["Slave DUT"]
    DUT -->|"TREADY"| Mon
    DUT -->|"TREADY"| Drv

directory_structure:
  root: "verif/axis_v3_2/"
  folders:
    - agent: "axis_master_driver.sv, axis_master_monitor.sv, axis_master_agent.sv, axis_if.sv"
    - env: "axis_env.sv, axis_scoreboard.sv, axis_pkg.sv"
    - tests: "base_test.sv, stress_test.sv"

code_snippets:
  - title: "Master Protocol Monitor (Role-Safe Observation)"
    code: |
      if (vif.TVALID && vif.TREADY) begin
        // Monitor observes successful handshake from both sides
        axis_item tr = axis_item::type_id::create("tr");
        tr.data = vif.TDATA;
        tr.last = vif.TLAST;
        ap.write(tr);
      end else if (vif.TVALID && !vif.TREADY) begin
        // Monitor observes protocol stall - verify stability
        `uvm_error("STABILITY_ERR", "TDATA changed during TREADY stall") if (vif.TDATA !== last_tdata);
      end

test_requirements:
  - {id: "REQ_MS_01", feature: "Handshake", sub_feature: "Stability", name: "Data Stability", description: "Master VIP shall keep TDATA stable while observing TREADY=0 from Slave DUT."}
  - {id: "REQ_MS_02", feature: "Handshake", sub_feature: "Latency", name: "TVALID Independence", description: "Master VIP must not require TREADY to be asserted before it asserts TVALID."}
  - {id: "REQ_MS_03", feature: "Reset", sub_feature: "Timing", name: "Reset Suppression", description: "Master VIP must drive TVALID to 0 during ARESETn."}
  - {id: "REQ_MS_04", feature: "Reset", sub_feature: "Recovery", name: "Reset Recovery", description: "Master VIP must wait 1+ cycles after reset deassertion before driving TVALID."}
  - {id: "REQ_MS_05", feature: "Packet", sub_feature: "ID", name: "TID Integrity", description: "Master VIP must hold TID constant throughout a packet until TLAST pulse."}
  - {id: "REQ_MS_06", feature: "Packet", sub_feature: "DEST", name: "TDEST Integrity", description: "Master VIP must hold TDEST constant throughout a packet."}
  - {id: "REQ_MS_07", feature: "Packet", sub_feature: "Boundary", name: "TLAST Rule", description: "Master VIP must assert TLAST on the final beat of every packet."}
  - {id: "REQ_MS_08", feature: "Qualifiers", sub_feature: "TKEEP", name: "Null Tracking", description: "Master VIP TKEEP bits correctly identify data vs null bytes."}
  - {id: "REQ_MS_09", feature: "Qualifiers", sub_feature: "TSTRB", name: "Strobe Tracking", description: "Master VIP TSTRB bits identify data vs position bytes."}
  - {id: "REQ_MS_10", feature: "Power", sub_feature: "AXI5", name: "Wakeup Protocol", description: "Master VIP MUST hold TWAKEUP asserted if TVALID is waiting for TREADY."}

test_cases:
  # --- HANDSHAKE ---
  - {id: "TC_HS_01", scenario: "Baseline Handshake: Master VIP asserts TVALID. Observer sees Slave DUT TREADY=1. Handshake in 1 cycle.", mapping: ["REQ_MS_01", "REQ_MS_02"]}
  - {id: "TC_HS_02", scenario: "Back-Pressure: Master VIP asserts TVALID. Observe TREADY=0 for 50 cycles. Verify TDATA remains frozen.", mapping: ["REQ_MS_01"]}
  - {id: "TC_HS_03", scenario: "Master Independence: Verify TVALID occurs even when TREADY is observed at constant 0.", mapping: ["REQ_MS_02"]}
  - {id: "TC_HS_04", scenario: "Back-to-Back: Mastery throughput with continuous TVALID/TREADY confluence.", mapping: ["REQ_MS_01"]}
  - {id: "TC_HS_05", scenario: "Master Stall: Master VIP deasserts TVALID mid-burst while Slave DUT observes TREADY=1.", mapping: ["REQ_MS_02"]}
  
  # --- RESET ---
  - {id: "TC_RST_01", scenario: "Async Reset: Assert reset mid-transfer. Verify Master VIP drives TVALID=0 immediately.", mapping: ["REQ_MS_03"]}
  - {id: "TC_RST_02", scenario: "Cold Recover: Drive TVALID on same cycle as reset release. Verify protocol violation check.", mapping: ["REQ_MS_04"]}
  - {id: "TC_RST_03", scenario: "Delayed Start: Wait 10 cycles after reset. Verify Master VIP resumes clean handshake.", mapping: ["REQ_MS_04"]}

  # --- PACKETS ---
  - {id: "TC_PKT_01", scenario: "Minimal Packet: Single beat with TLAST=1.", mapping: ["REQ_MS_07"]}
  - {id: "TC_PKT_02", scenario: "Exhaustive Lengths: Packets of size 2, 8, 33, 64, 1024. Verify TLAST on final cycle.", mapping: ["REQ_MS_07"]}
  - {id: "TC_PKT_03", scenario: "TID Switch: Send Packet 1 (TID=0xA), then Packet 2 (TID=0xB) with zero gap.", mapping: ["REQ_MS_05"]}
  - {id: "TC_PKT_04", scenario: "TID Mid-Packet Violation: Attempt to toggle TID bits while TLAST=0. Trigger assertion.", mapping: ["REQ_MS_05"]}
  - {id: "TC_PKT_05", scenario: "TDEST Check: Verify TDEST routing for multi-destination slave configurations.", mapping: ["REQ_MS_06"]}
  - {id: "TC_PKT_06", scenario: "Zero-Byte Packet: TLAST=1 but all TKEEP bits=0. Verify Slave DUT acknowledge.", mapping: ["REQ_MS_08"]}
  
  # --- QUALIFIERS ---
  - {id: "TC_QUA_01", scenario: "All-Ones TKEEP: Standard dense data transfer.", mapping: ["REQ_MS_08"]}
  - {id: "TC_QUA_02", scenario: "Sparse TKEEP: Drive packet where only even bytes are valid.", mapping: ["REQ_MS_08"]}
  - {id: "TC_QUA_03", scenario: "Data-Position Swap: Toggle TSTRB while TKEEP is 1 to verify position beats.", mapping: ["REQ_MS_09"]}
  - {id: "TC_QUA_04", scenario: "Parity Integrity: Inject AXI5 parity errors on TDATACHK bits.", mapping: ["REQ_MS_01"]}

  # --- POWER ---
  - {id: "TC_PWR_01", scenario: "Wakeup Assert: TWAKEUP asserted 1 cycle before TVALID. Observe Slave DUT response.", mapping: ["REQ_MS_10"]}
  - {id: "TC_PWR_02", scenario: "Wakeup Wait: Hold TWAKEUP and TVALID. Observe Slave DUT ready latency.", mapping: ["REQ_MS_10"]}
  - {id: "TC_PWR_03", scenario: "Illegal Wakeup Drop: Deassert TWAKEUP while TVALID=1 and TREADY=0.", mapping: ["REQ_MS_10"]}

  # --- PERFORMANCE ---
  - {id: "TC_PRF_01", scenario: "Max Throughput: 10,000 beats with zero stall from both sides.", mapping: ["REQ_MS_01"]}
  - {id: "TC_PRF_02", scenario: "Intermittent back-pressure: Master VIP throttles if Slave DUT TREADY latency > 10 cycles.", mapping: ["REQ_MS_10"]}
  
  # --- STRESS ---
  - {id: "TC_STR_01", scenario: "Random Handshake: Randomize TVALID gaps and observe Slave DUT random TREADY gaps.", mapping: ["REQ_MS_01", "REQ_MS_10"]}
  - {id: "TC_STR_02", scenario: "Packet Size Jitter: Randomize length from 1 to 4096 beats.", mapping: ["REQ_MS_07"]}
  - {id: "TC_STR_03", scenario: "ID Pressure: Rapidly cycle all 256 TID values back-to-back.", mapping: ["REQ_MS_05"]}
  - {id: "TC_STR_04", scenario: "User Sideband Stress: Randomized bit-flipping on TUSER bits.", mapping: ["REQ_MS_01"]}

  # --- ADDITIONAL DENSITY ---
  - {id: "TC_ADD_01", scenario: "Unaligned Start: TKEEP[0]=0 at packet start. Verify Receiver handling.", mapping: ["REQ_MS_08"]}
  - {id: "TC_ADD_02", scenario: "Unaligned End: TKEEP[7]=0 at TLAST. Verify padding logic.", mapping: ["REQ_MS_08"]}
  - {id: "TC_ADD_03", scenario: "Multiple Terminations: Verify TLAST behavior in merged vs split streams.", mapping: ["REQ_MS_07"]}
  - {id: "TC_ADD_04", scenario: "Deadlock Timeout: Monitor observes TREADY stall exceeding 1,000,000 cycles.", mapping: ["REQ_MS_01"]}
  - {id: "TC_ADD_05", scenario: "Reset Recovery Race: Assert reset precisely on first TVALID beat.", mapping: ["REQ_MS_03"]}
  - {id: "TC_ADD_06", scenario: "TID Alias: Send different packets with identical TID but distinct TDEST.", mapping: ["REQ_MS_06"]}
  - {id: "TC_ADD_07", scenario: "Illegal Strobe: Drive TSTRB without TKEEP. Observe VIP monitor checking.", mapping: ["REQ_MS_09"]}
  - {id: "TC_ADD_08", scenario: "Protocol Wrap: Run directed sequence of all corner cases in one simulation.", mapping: ["REQ_MS_10"]}

interface_signals:
  - {name: "TDATA", direction: "Output", width: "TD_W", description: "Data payload."}
  - {name: "TVALID", direction: "Output", width: 1, description: "Master valid."}
  - {name: "TREADY", direction: "Input", width: 1, description: "Slave ready (Observed)."}
  - {name: "TLAST", direction: "Output", width: 1, description: "Packet end."}
  - {name: "TID", direction: "Output", width: "TID_W", description: "Stream ID."}
  - {name: "TDEST", direction: "Output", width: "TDEST_W", description: "Dest ID."}
  - {name: "TKEEP", direction: "Output", width: "TD_W/8", description: "Null bytes."}
  - {name: "TSTRB", direction: "Output", width: "TD_W/8", description: "Strobes."}

coverage_groups:
  - {name: "cg_handshake", description: "Cross of Master TVALID and Observed Slave TREADY."}
  - {name: "cg_packet_size", description: "Distribution of beat counts per packet."}
  - {name: "cg_reset_recovery", description: "Delay from ARESETn rising edge to TVALID rising edge."}
