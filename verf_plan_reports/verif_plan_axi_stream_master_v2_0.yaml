# ==============================================================================
# AMBA AXI-Stream Protocol Verification Plan (Master Role)
# Version: 2.0 (Full-Stack E2E Mastery - From Start)
# ==============================================================================

project: "AXI-Stream Enterprise Final"
version: "2.0"
verification_role: "Master"

uvm_environment_diagram: |
  graph TD
    Seq["vseq"] --> Seqr["axis_sequencer"]
    Seqr --> Drv["axis_driver"]
    VIF["axis_if"] --> Mon["axis_monitor"]
    Mon --> Sbd["axis_scoreboard"]
    Drv -->|"TDATA, TVALID"| DUT["Slave DUT"]
    DUT -->|"TREADY"| Mon

directory_structure:
  root: "verif/axis_v2_0/"
  folders:
    - agent: "axis_driver.sv, axis_monitor.sv, axis_agent.sv, axis_if.sv"
    - env: "axis_env.sv, axis_scoreboard.sv, axis_pkg.sv"
    - tests: "base_test.sv, stress_test.sv"

code_snippets:
  - title: "Master Monitor: Data Capture"
    code: |
      if (vif.TVALID && vif.TREADY) begin
        axis_tx tr = axis_tx::type_id::create("tr");
        tr.data = vif.TDATA;
        tr.last = vif.TLAST;
        analysis_port.write(tr);
      end
  - title: "Master Protocol Assertion: Validity"
    code: |
      property p_valid_after_reset;
        @(posedge ACLK) $rose(ARESETn) |-> !TVALID [*1];
      endproperty
      assert_valid_reset: assert property(p_valid_after_reset);

test_requirements:
  - {id: "REQ_01", feature: "Handshake", sub_feature: "Stability", name: "Data Stability", description: "Master must not change TDATA until TREADY is HIGH."}
  - {id: "REQ_02", feature: "Handshake", sub_feature: "Timing", name: "Valid Independence", description: "TVALID must not depend on TREADY."}
  - {id: "REQ_03", feature: "Reset", sub_feature: "Timing", name: "Reset Suppression", description: "TVALID must be LOW during ARESETn."}
  - {id: "REQ_04", feature: "Reset", sub_feature: "Recovery", name: "Reset Recovery", description: "Min 1 cycle gap after ARESETn deassertion before TVALID."}
  - {id: "REQ_05", feature: "Packet", sub_feature: "Stability", name: "ID Integrity", description: "TID/TDEST must be constant within a packet."}
  - {id: "REQ_06", feature: "Qualifiers", sub_feature: "TKEEP", name: "Null Tracking", description: "TKEEP bits must be preserved through the stream."}
  - {id: "REQ_07", feature: "Qualifiers", sub_feature: "TSTRB", name: "Strobe Tracking", description: "TSTRB must follow data vs position rules."}
  - {id: "REQ_08", feature: "Packet", sub_feature: "Boundary", name: "TLAST Rule", description: "TLAST must indicate the final beat of a packet."}
  - {id: "REQ_09", feature: "Power", sub_feature: "AXI5", name: "TWAKEUP Assert", description: "TWAKEUP must indicate activity associated with the link."}
  - {id: "REQ_10", feature: "Sideband", sub_feature: "TUSER", name: "User Sideband", description: "TUSER must follow standard stability rules."}

test_cases:
  - {id: "TC_HS_01", scenario: "Simple Handshake: Single beat transfer.", mapping: ["REQ_01", "REQ_02"]}
  - {id: "TC_HS_02", scenario: "Slave Stall: Hold TREADY LOW for 20 cycles. Verify TDATA stable.", mapping: ["REQ_01"]}
  - {id: "TC_HS_03", scenario: "Master Stall: Hold TVALID LOW while TREADY 1. Verify no movement.", mapping: ["REQ_02"]}
  - {id: "TC_HS_04", scenario: "Back-to-Back: Mastery stream of 1000 continuous beats.", mapping: ["REQ_01"]}
  - {id: "TC_RST_01", scenario: "Reset Mid-Transfer: Assert reset while TVALID=1. TREADY=0.", mapping: ["REQ_03"]}
  - {id: "TC_RST_02", scenario: "Cold Boot: Drive valid on Cycle 0 of reset end. Fail expected.", mapping: ["REQ_04"]}
  - {id: "TC_PKT_01", scenario: "Single Beat Packet: TLAST=1 for 1-beat transfer.", mapping: ["REQ_08"]}
  - {id: "TC_PKT_02", scenario: "Exhaustive Packet Length: Multi-beat from 2 to 512 beats.", mapping: ["REQ_08"]}
  - {id: "TC_PKT_03", scenario: "TID Consistency: Constant TID for a 32-beat packet.", mapping: ["REQ_05"]}
  - {id: "TC_PKT_04", scenario: "TDEST Consistency: Constant TDEST for a 32-beat packet.", mapping: ["REQ_05"]}
  - {id: "TC_PKT_05", scenario: "Illegal TID Change: Toggle TID bits at Beat 5 of 10. Fail expected.", mapping: ["REQ_05"]}
  - {id: "TC_PKT_06", scenario: "Zero-Data Packet: TLAST=1 with all TKEEP bits=0.", mapping: ["REQ_06"]}
  - {id: "TC_QUAL_01", scenario: "All-Zero TSTRB: Position-only bytes transfer.", mapping: ["REQ_07"]}
  - {id: "TC_QUAL_02", scenario: "Partial TKEEP: Sparse data stream with holes.", mapping: ["REQ_06"]}
  - {id: "TC_QUAL_03", scenario: "TSTRB Override: TKEEP=1, TSTRB=0 pattern.", mapping: ["REQ_07"]}
  - {id: "TC_PWR_01", scenario: "Wakeup Latency: TWAKEUP asserted 5 cycles before TVALID.", mapping: ["REQ_09"]}
  - {id: "TC_PWR_02", scenario: "Wakeup Drop: TWAKEUP dropped before handshake occurs. Fail expected.", mapping: ["REQ_09"]}
  - {id: "TC_SIDE_01", scenario: "TUSER Stability: Toggle TUSER while stalled. Verify violation.", mapping: ["REQ_10"]}
  - {id: "TC_SIDE_02", scenario: "TUSER Bitwalk: Walk 1 through TUSER width.", mapping: ["REQ_10"]}
  - {id: "TC_STR_01", scenario: "Random Handshake Pressure: Random TVALID/TREADY gaps.", mapping: ["REQ_01", "REQ_02"]}
  - {id: "TC_STR_02", scenario: "Heavy Packet Interleaving: Rapid TID/TDEST switches.", mapping: ["REQ_05"]}
  - {id: "TC_STR_03", scenario: "Clock Frequency stress: Verify protocol at 1GHz.", mapping: ["REQ_01"]}
  - {id: "TC_VAL_01", scenario: "Minimal TVALID: Pulse TVALID only every 10 cycles.", mapping: ["REQ_02"]}
  - {id: "TC_VAL_02", scenario: "Indefinite Stall: Hold TREADY LOW for 10,000 cycles. Check stability.", mapping: ["REQ_01"]}
  - {id: "TC_COR_01", scenario: "MAX Width TDATA: 1024-bit data path throughput.", mapping: ["REQ_01"]}
  - {id: "TC_COR_02", scenario: "Zero Width TDATA: Control-only interface.", mapping: ["REQ_02"]}
  - {id: "TC_COR_03", scenario: "Max TID: Use 64-bit TID values.", mapping: ["REQ_05"]}
  - {id: "TC_COR_04", scenario: "Max TDEST: Use 64-bit TDEST values.", mapping: ["REQ_05"]}
  - {id: "TC_FINAL_01", scenario: "Regression: Sequence of 100 random packets.", mapping: ["REQ_01", "REQ_05", "REQ_08"]}
  - {id: "TC_FINAL_02", scenario: "Status Check: Post-regression register dump.", mapping: ["REQ_01"]}
  - {id: "TC_EXT_01", scenario: "Extra Pressure: Randomize Slave READY behavior.", mapping: ["REQ_01"]}
  - {id: "TC_EXT_02", scenario: "Extra Density: Cross TID x TLAST timings.", mapping: ["REQ_05"]}
  - {id: "TC_EXT_03", scenario: "AXI5 Wakeup Stress: Randomize power state transitions.", mapping: ["REQ_09"]}
  - {id: "TC_EXT_04", scenario: "Sideband Consistency: Verify TUSER across packet boundaries.", mapping: ["REQ_10"]}
  - {id: "TC_EXT_05", scenario: "Reset Resilience: Async reset during heavy traffic.", mapping: ["REQ_03"]}

interface_signals:
  - {name: "TDATA", direction: "Master", width: "TD_W", description: "Data payload."}
  - {name: "TVALID", direction: "Master", width: 1, description: "Valid indicator."}
  - {name: "TREADY", direction: "Slave", width: 1, description: "Ready back-pressure."}
  - {name: "TLAST", direction: "Master", width: 1, description: "Packet end."}
  - {name: "TID", direction: "Master", width: "TID_W", description: "Stream ID."}
  - {name: "TDEST", direction: "Master", width: "TDEST_W", description: "Dest ID."}
  - {name: "TKEEP", direction: "Master", width: "TD_W/8", description: "Null byte marking."}
  - {name: "TSTRB", direction: "Master", width: "TD_W/8", description: "Data/Pos strobe."}
  - {name: "TUSER", direction: "Master", width: "TU_W", description: "User sideband."}
  - {name: "TWAKEUP", direction: "Master", width: 1, description: "AXI5 Wakeup."}

coverage_groups:
  - {name: "cg_handshake", description: "Cross of TVALID and TREADY."}
  - {name: "cg_data", description: "Walk-1 pattern on TDATA."}
  - {name: "cg_packet", description: "Packet size bins and ID switches."}
