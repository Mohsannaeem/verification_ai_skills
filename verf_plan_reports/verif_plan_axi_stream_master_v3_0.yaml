directory_structure:
  root: "axi_stream_master_vip_tb/"
  folders:
    - master_agent: "axi_stream_master_driver.sv, axi_stream_master_monitor.sv, axi_stream_master_sequencer.sv, axi_stream_master_agent.sv, axi_stream_master_agent_config.sv, axi_stream_master_callback.sv"
    - env: "axi_stream_master_env.sv, axi_stream_master_scoreboard.sv, axi_stream_master_env_config.sv"
    - sequences: "axi_stream_master_seq_item.sv, axi_stream_master_base_sequence.sv, axi_stream_master_rand_sequence.sv, axi_stream_master_stress_sequence.sv"
    - top: "axi_stream_master_tb_top.sv, axi_stream_master_test.sv, axi_stream_master_defines.sv, axi_stream_if.sv"

# ==============================================================================
# SECTION 7: Code Snippets (Architecture Blueprint - No raw SV syntax)
# ==============================================================================
code_snippets:
  - title: "axi_stream_master_seq_item.sv (Architecture Blueprint)"
    code: |
      COMPONENT: axi_stream_master_seq_item
      EXTENDS: uvm_sequence_item
      MEMBERS:
        - [rand logic [TDATA_WIDTH-1:0]] tdata
        - [rand logic [TDATA_WIDTH/8-1:0]] tkeep
        - [rand logic [TDATA_WIDTH/8-1:0]] tstrb
        - [rand logic] tlast
        - [rand logic [TID_WIDTH-1:0]] tid
        - [rand logic [TDEST_WIDTH-1:0]] tdest
        - [rand logic [TUSER_WIDTH-1:0]] tuser
        - [rand int unsigned] stall_cycles
      CONSTRAINTS:
        - stall_cycles: between 0 and 50 cycles (weighted toward 0 for high-throughput scenarios)
        - tkeep: cannot be all-zero unless tlast is also 1 (null packet rule)
        - tstrb: must be a subset of tkeep (no strobe bit set where keep is 0)

  - title: "axi_stream_master_driver.sv (Architecture Blueprint)"
    code: |
      COMPONENT: axi_stream_master_driver
      EXTENDS: uvm_driver (axi_stream_master_seq_item)
      CONFIG_REF: axi_stream_master_agent_config (Source: ConfigDB)
      MEMBERS:
        - [virtual axi_stream_if] vif
        - [axi_stream_master_agent_config] cfg
      METHODS & LOGIC:
        - build_phase: Retrieve vif from ConfigDB. Retrieve cfg from ConfigDB.
        - run_phase: Loop forever. Call seq_item_port.get_next_item(req).
          Drive vif.TVALID=1 and all payload pins from req on next posedge ACLK.
          Wait for TREADY=1 on the same posedge (handshake check).
          Call seq_item_port.item_done().
          If req.stall_cycles > 0, drive TVALID=0 for that many cycles before next item.

  - title: "axi_stream_master_monitor.sv (Architecture Blueprint)"
    code: |
      COMPONENT: axi_stream_master_monitor
      EXTENDS: uvm_monitor
      MEMBERS:
        - [virtual axi_stream_if] vif
        - [uvm_analysis_port] ap
      METHODS & LOGIC:
        - run_phase: Loop on posedge ACLK. If ARESETn is LOW, confirm TVALID=0 else fire error.
          If TVALID=1 and TREADY=1 (handshake): capture all signals into new seq_item. Write to ap.
          If TVALID=1 and TREADY=0 (stall): verify $stable for all output signals every cycle.
