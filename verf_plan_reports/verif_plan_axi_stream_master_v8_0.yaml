test_requirements:
  - id: "REQ_MST_01"
    name: "TVALID Stability and Handshake Integrity"
    spec_ref: "Section 2.2, Page 2-18"
    description: |
      The AXI-Stream handshake is predicated on the invariant that once a Transmitter asserts
      TVALID, it must hold TVALID HIGH and maintain all associated payload signals (TDATA,
      TSTRB, TKEEP, TLAST, TID, TDEST, TUSER) in a stable state until the handshake completes
      via coincident TREADY assertion. Critically, the Transmitter (VIP Master) is prohibited
      from conditioning TVALID assertion on a prior TREADY observation — doing so would introduce
      a combinatorial dependency that risks deadlock. 

      Verification Intent: The VIP Master driver must assert TVALID and hold all sideband signals
      with strict stability until TREADY is observed. The monitor will assert on mid-handshake mutations. 
      We will inject TVALID drops via VIP configurations to characterize DUT responses. Under no circumstance
      should the DUT require non-standard behaviors; it should trigger its native state exception handling.

  - id: "REQ_MST_02"
    name: "Packet Boundary Generation via TLAST Assertion"
    spec_ref: "Section 2.6, Page 2-26"
    description: |
      TLAST is the exclusive packet-boundary indicator generated by the Transmitter (VIP Master).
      The number of TLAST assertions must be preserved end-to-end between Transmitter and Receiver
      without additional assertions (false boundaries) or suppressions (missed boundaries). 

      Verification Intent: VIP sequences must systematically cover variable-length transfers (1 to 256 beats)
      and continuous consecutive packets with zero gap. The scoreboard will parse standard TLAST assertions
      and assert data grouping correctness, entirely driven by configurable VIP framing intervals.

  - id: "REQ_MST_03"
    name: "Byte Qualifier Conformance - TKEEP and TSTRB Encoding"
    spec_ref: "Section 2.5, Page 2-24"
    description: |
      TKEEP governs byte transport eligibility. The combination TKEEP=LOW/TSTRB=HIGH is architecturally reserved
      and constitutes a protocol violation. 

      Verification Intent: VIP sequences must systematically vary TKEEP and TSTRB across all byte lanes, including
      driving reserved configurations as negative stimulus. The DUT is assumed to operate securely; the environment
      will observe its native error responses when standard illegal byte masks are forced from the VIP.

  - id: "REQ_MST_04"
    name: "Clock and Reset Protocol - TVALID Deassertion During ARESETn"
    spec_ref: "Section 2.8.2, Page 2-28"
    description: |
      During ARESETn assertion, TVALID must be driven LOW. Premature TVALID assertion post-reset
      constitutes a protocol violation that may corrupt the DUT Slave's initialization state.

      Verification Intent: The VIP reset-sequence handles overriding the protocol state. Reset events
      will be driven asynchronously by the VIP mid-packet and mid-handshake. The DUT must correctly 
      flush standard buffers according to spec without requiring custom rescue stimulus from the agent.

  - id: "REQ_MST_05"
    name: "AXI5 Parity Generation Across All Check Signals"
    spec_ref: "Chapter 5, Page 5-44"
    description: |
      The AXI5-Stream parity protection scheme employs odd parity across all interface signals.
      TDATACHK must be driven for all byte lanes unconditionally (even null lanes).

      Verification Intent: The VIP will continuously calculate and drive proper odd parity matrices.
      Test case scenarios will actively corrupt single bits on the VIP transmitter driver to stimulate the DUT's 
      standard error interrupts. The environment will not require the DUT to support custom diagnostic overrides.

  - id: "REQ_MST_06"
    name: "Multi-Stream Interleaving Integrity"
    spec_ref: "Section 4.1, Page 4-40"
    description: |
      Inter-stream interleaving at per-transfer granularity is permitted. The VIP Master 
      must maintain independent stream contexts for each active TID value and must not reorder 
      beats within a shared stream context.

      Verification Intent: The VIP will leverage variable-rate sequence arbitration to interleave up 
      to four concurrent streams on a beat-granularity. The scoreboard will reconstruct data segments 
      without modifying or restricting DUT routing thresholds. 

test_cases:
  - id: "TC_MST_001"
    scenario: "TVALID-First Handshake: VIP Master sequence asserts TVALID with stable TDATA. The VIP delays subsequent action while DUT Slave holds TREADY randomly. The VIP monitor confirms payload stability across the stalling boundary."
    mapping: ["REQ_MST_01"]

  - id: "TC_MST_002"
    scenario: "Negative Parameterized Drop: VIP is instructed to deliberately withdraw TVALID before TREADY assertion. The standard DUT behavior is observed and verified against spec compliance."
    mapping: ["REQ_MST_01"]

  - id: "TC_MST_003"
    scenario: "Back-to-Back Packet Sequence: VIP sequence drives a continuous payload where TLAST=1 is immediately followed by a new packet with TVALID=1 in the very next cycle without gap. The scoreboard verifies standard DUT routing extraction."
    mapping: ["REQ_MST_02"]

  - id: "TC_MST_004"
    scenario: "Sparse Stream Position Sequence: VIP drives randomized TKEEP variations covering fully null packages, position bytes, and mixed data streams. The scoreboard validates physical byte extraction."
    mapping: ["REQ_MST_03"]

  - id: "TC_MST_005"
    scenario: "Reserved Encoding Injection: VIP driver forces sequence TKEEP=0/TSTRB=1 locally to trigger a negative constraint. Standard DUT reporting thresholds (if implemented) are captured."
    mapping: ["REQ_MST_03"]

  - id: "TC_MST_006"
    scenario: "Mid-Packet Asynchronous Reset: While VIP holds TVALID=1/TREADY=0, the VIP synchronously drives ARESETn LOW. Confirm DUT reliably drops pipeline and recovers on its own."
    mapping: ["REQ_MST_04"]

  - id: "TC_MST_007"
    scenario: "AXI5 Parity Single-Bit Inversion: VIP driver mathematically calculates correct parity, then inverts bit 1 of TDATACHK array. The monitor logs standard DUT protocol violation responses."
    mapping: ["REQ_MST_05"]

  - id: "TC_MST_008"
    scenario: "High-Depth Multi-Sequence Interleave: Four parallel VIP sequences drive disjoint TID packets into a shared driver. The VIP arbitrates tightly, generating a deeply interleaved stream. The scoreboard tests DUT tracking stability."
    mapping: ["REQ_MST_06"]

coverage_groups:
  - name: "cg_handshake_ordering"
    description: "Standard cross-coverage of TVALID/TREADY timing relations and VIP-induced wait-states."
    mapping: ["REQ_MST_01"]

  - name: "cg_packet_boundary_dimensions"
    description: "Coverage bins for packet sizes dynamically constrained by the VIP sequences (single, multi, continuous)."
    mapping: ["REQ_MST_02"]

  - name: "cg_byte_lane_permutations"
    description: "Coverage group mapping the TKEEP driver metrics against legal and illegal VIP combinations."
    mapping: ["REQ_MST_03"]

  - name: "cg_reset_window_injections"
    description: "Vector tracking exactly where in the transfer phase the VIP interrupted the DUT via ARESETn."
    mapping: ["REQ_MST_04"]

  - name: "cg_parity_failure_positions"
    description: "Tracks individual bits inverted by the VIP driver to ensure the DUT parity path is fully exercised."
    mapping: ["REQ_MST_05"]

  - name: "cg_stream_interleave_depths"
    description: "Records max concurrent sequence IDs handled cleanly by the standard DUT architecture."
    mapping: ["REQ_MST_06"]

interface_signals:
  - name: "ACLK"
    direction: "Input (to VIP Master and DUT Slave)"
    width: "1"
    description: "Global synchronization clock."

  - name: "ARESETn"
    direction: "Input (to VIP Master and DUT Slave)"
    width: "1"
    description: "Active-LOW global reset."

  - name: "TVALID"
    direction: "Output (VIP Master / Transmitter)"
    width: "1"
    description: "Driven by the VIP Master. Indicates a valid transfer payload is present."

  - name: "TREADY"
    direction: "Input (from DUT Slave / Receiver)"
    width: "1"
    description: "Driven by the DUT Slave to signal readiness to accept a transfer."

  - name: "TDATA"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH"
    description: "Primary data payload."

  - name: "TSTRB"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH/8"
    description: "Per-byte data qualifier."

  - name: "TKEEP"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH/8"
    description: "Per-byte position qualifier."

  - name: "TLAST"
    direction: "Output (VIP Master / Transmitter)"
    width: "1"
    description: "Packet-boundary indicator."

  - name: "TID"
    direction: "Output (VIP Master / Transmitter)"
    width: "TID_WIDTH"
    description: "Stream identifier."

  - name: "TDEST"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDEST_WIDTH"
    description: "Routing identifier."

  - name: "TVALIDCHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TVALID."

  - name: "TDATACHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "TDATA_WIDTH/8"
    description: "Odd parity check per byte lane of TDATA."

  - name: "TLASTCHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TLAST."

  - name: "TREADYCHK"
    direction: "Input (from DUT Slave / Receiver, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TREADY, generated by the DUT Slave."

directory_structure:
  root: "axi_stream_master_vip_tb/"
  folders:
    - master_agent: "VIP Master Agent: Sequencer, Driver (drives TVALID/TDATA/TLAST/parity), Monitor"
    - env: "UVM Environment: Scoreboard, Protocol Checker, Coverage Collector, EnvConfig"
    - sequences: "Stimulus library: handshake variants, sparse-stream, back-to-back, null-packet, parity-gen, parity-inject, reset, interleaving, wakeup"
    - tests: "UVM test classes mapping each scenario to sequence combinations and config overrides"
    - assertions: "SVA property file for real-time protocol conformance (stability, reserved-encoding, parity)"
    - top: "Simulation top: DUT (Slave) instantiation, virtual interface binding, clock and reset generation"
    - verif_plan: "Artifacts: YAML traceability matrix, PDF report, sub-prompt reference files"
