test_requirements:
  - id: "REQ_MST_01"
    name: "TVALID-to-Payload Stability Dependency"
    spec_ref: "Section 2.2"
    description: |
      Direct signal dependency: When TVALID=1 and TREADY=0, the state of TDATA, TSTRB, TKEEP, TLAST, TID, TDEST, 
      and TUSER must not change. The protocol mandates that a Transmitter must unconditionally hold payload signals 
      stable until TREADY=1 is sampled coincidently with TVALID=1 to prevent race conditions during sampling.

      Verification Intent: Ensure the VIP sequences drive stable payload signatures across highly randomized TREADY stall windows. 
      The protocol monitor must fire fatal assertions if any payload bit changes mid-stall. This enforces strict spec compliance 
      at the conformance boundary. Directed scenarios force standard compliance checks under various stall densities.

  - id: "REQ_MST_02"
    name: "TLAST to TVALID Synchronization Constraint"
    spec_ref: "Section 2.6"
    description: |
      Dependency Model: TLAST acts as the packet termination qualifier and holds logical meaning ONLY when TVALID=1. TLAST assertion 
      cannot occur independent of TVALID. A packet starts immediately after a previous TLAST assertion, or on the first TVALID=1 
      post-reset for a given TID/TDEST tuple.

      Verification Intent: The VIP sequences will manipulate the interval between TVALID events and TLAST events, creating randomized 
      multi-beat packet formations up to 4096 beats, single-beat packets, and zero-data null packets.

  - id: "REQ_MST_03"
    name: "TKEEP to TSTRB Mask Constraint"
    spec_ref: "Section 2.5"
    description: |
      Signal Relationship: TKEEP and TSTRB share a strict dependency. TKEEP=0 designates a null byte, making TSTRB mathematically 
      irrelevant (protocol reserved). TKEEP=1/TSTRB=1 is an evaluated data byte; TKEEP=1/TSTRB=0 is a position byte.

      Verification Intent: The VIP stimulus will enforce valid TKEEP/TSTRB combinations by generating sparse offsets dynamically.
      Negative injection handles driving the illegal TKEEP=0/TSTRB=1 condition to ensure the standard DUT error vectors trigger without modifications.

  - id: "REQ_MST_04"
    name: "TWAKEUP Pre-Transfer to TVALID/TREADY Lead Time"
    spec_ref: "Section 2.3"
    description: |
      Signal dependency: TWAKEUP is an AXI5 preemptive signal. If TWAKEUP transitions HIGH concurrently with TVALID, 
      the spec dictates that TWAKEUP MUST remain HIGH until TREADY=1 completes the handshake. If TWAKEUP leads TVALID, 
      it provides power-activation buffering logic to the Slave.

      Verification Intent: VIP constraints will sweep the temporal relationship: TWAKEUP asserted randomized cycles (1..32) prior 
      to TVALID, and TWAKEUP simultaneous with TVALID. The DUT must correctly un-stall its TREADY pathway in standard operating conditions.

  - id: "REQ_MST_05"
    name: "TDATACHK to Null TKEEP Parity Computation"
    spec_ref: "Chapter 5"
    description: |
      Intersection analysis: TDATACHK represents the odd parity vector of the TDATA payload. The spec strictly mandates that 
      the parity check MUST be driven across ALL physical byte lanes regardless of the TKEEP mask state. A TKEEP=0 lane 
      must still maintain active TDATA parity protection. 

      Verification Intent: The VIP transmitter passively calculates parity bits on all generated physical bus vectors independently 
      of the TKEEP/TSTRB configuration. Tests will randomize data underlying disabled TKEEP bytes to verify the DUT parity error check logic.

  - id: "REQ_MST_06"
    name: "ARESETn Active Suppression of TVALID"
    spec_ref: "Section 2.8.2"
    description: |
      Global Override: ARESETn=LOW overrides all normal operations. TVALID must remain LOW while ARESETn is LOW. TVALID must only 
      transition HIGH on a rising ACLK edge occurring strictly after the ACLK edge where ARESETn transitions HIGH.

      Verification Intent: VIP forces asynchronous reset generation at peak bus congestion (TVALID=1, TREADY=0). The VIP automatically 
      clamps TVALID=0. Monitors verify zero combinatorial bleed-through on TVALID after reset injection.

  - id: "REQ_MST_07"
    name: "Arbitration Independence of TID Stream Paths"
    spec_ref: "Section 4.1"
    description: |
      Stream interdependency check: TDATA payload transfers sharing matching TID/TDEST identifiers must maintain strict temporal ordering. 
      Transfers with distinct TID identifiers hold zero temporal interdependency and may be interleaved at transfer granularity.

      Verification Intent: The VIP runs a heavily randomized sequencer interleaving unique TID streams across a shared physical 
      driver. The scoreboard passively demultiplexes TIDs and checks order-invariant progression within each unique identifier.


test_cases:
  # -> Mapped to REQ_MST_01 (TVALID Stability) - 4 Tests
  - id: "TC_MST_001_A"
    scenario: "Directed Handshake Stalling: The VIP generator issues a directed 256-beat incremental stream. Randomization logic dynamically injects standard 0-to-4 cycle stalls."
    mapping: ["REQ_MST_01"]

  - id: "TC_MST_001_B"
    scenario: "Directed Extreme Stall Injection: The VIP generates valid stimulus but forces randomized 50+ cycle stall gaps between TREADY loops to pressure stability."
    mapping: ["REQ_MST_01"]

  - id: "TC_MST_001_C"
    scenario: "Directed Combinatorial Backpressure: VIP drives back-to-back continuous payloads. Randomization is applied to the DUT's simulated TREADY latency to generate 0-wait continuous flows."
    mapping: ["REQ_MST_01"]

  - id: "TC_MST_001_D"
    scenario: "Negative Parameterized Drop: VIP is instructed to deliberately withdraw TVALID before TREADY assertion. The standard DUT behavior is observed and verified against spec compliance."
    mapping: ["REQ_MST_01"]


  # -> Mapped to REQ_MST_02 (TLAST Formatting) - 4 Tests
  - id: "TC_MST_002_A"
    scenario: "Directed Single-Beat Packets: VIP constrained to constantly sequence 1-beat packets where TVALID and TLAST coincide on every transfer dynamically."
    mapping: ["REQ_MST_02"]

  - id: "TC_MST_002_B"
    scenario: "Directed Jumbo Framing: VIP generator randomized to build 4096+ beat continuous packet structures verifying boundary counters."
    mapping: ["REQ_MST_02"]

  - id: "TC_MST_002_C"
    scenario: "Directed Null Packet Generation: VIP randomly configured to sequence Null-Size (TKEEP=all zeros, TLAST=1, TVALID=1) bursts mapping empty extraction."
    mapping: ["REQ_MST_02"]

  - id: "TC_MST_002_D"
    scenario: "Back-to-Back Packet Sequence: VIP sequence drives a continuous payload where TLAST=1 is immediately followed by a new packet with TVALID=1 in the very next cycle without gap."
    mapping: ["REQ_MST_02"]


  # -> Mapped to REQ_MST_03 (TKEEP/TSTRB Encodings) - 4 Tests
  - id: "TC_MST_003_A"
    scenario: "Directed Sparse Stream Position Sequence: VIP drives randomized TKEEP variations covering fully null packages, position bytes, and mixed data streams dynamically across 500 transfers."
    mapping: ["REQ_MST_03"]

  - id: "TC_MST_003_B"
    scenario: "Directed Full Byte Alignment: VIP forces TKEEP=1/TSTRB=1 uniformly across all physical lanes across randomized burst volumes to confirm peak efficiency processing."
    mapping: ["REQ_MST_03"]

  - id: "TC_MST_003_C"
    scenario: "Directed Position Buffer Validation: VIP generates continuous payload where data bytes are deliberately spaced by TSTRB=0 position placeholders to test DUT reconstitution."
    mapping: ["REQ_MST_03"]

  - id: "TC_MST_003_D"
    scenario: "Negative TSTRB Qualifier Corruption: VIP is directed to force an illegal TKEEP=0, TSTRB=1 array mask locally. VIP fault injection completes safely. Standard DUT reporting thresholds capture violation."
    mapping: ["REQ_MST_03"]


  # -> Mapped to REQ_MST_04 (TWAKEUP Timings) - 3 Tests
  - id: "TC_MST_004_A"
    scenario: "Directed Simultaneous Wakeup: VIP constrained to generate TWAKEUP and TVALID simultaneously, holding both HIGH through dynamic wait periods until TREADY compliance."
    mapping: ["REQ_MST_04"]

  - id: "TC_MST_004_B"
    scenario: "Directed Recommended Latency Sweep: VIP sequences TWAKEUP generation ahead of TVALID randomly partitioned between 1 and 4 ACLK cycles dynamically."
    mapping: ["REQ_MST_04"]

  - id: "TC_MST_004_C"
    scenario: "Directed Extreme Pre-Activation: VIP sequences TWAKEUP 30+ cycles prior to TVALID generation to test power-domain buffering logic saturation inside the standard DUT."
    mapping: ["REQ_MST_04"]


  # -> Mapped to REQ_MST_05 (TDATACHK Parity) - 4 Tests
  - id: "TC_MST_005_A"
    scenario: "Directed Checksum Baseline Protocol: VIP calculates compliant odd parity continuously over randomized payload traffic while observing standard DUT operational throughput."
    mapping: ["REQ_MST_05"]

  - id: "TC_MST_005_B"
    scenario: "Directed Checksum Null-Lane Sweep: VIP directed to transmit transfers where TKEEP=0 over 50% of byte lanes. VIP calculates valid parity using suppressed underlying data vectors."
    mapping: ["REQ_MST_05"]

  - id: "TC_MST_005_C"
    scenario: "Negative TDATACHK Parity Injection: VIP explicitly flips the checksum parity bit on TDATACHK[2] dynamically during an active structural transmission. Standard DUT path resolves error."
    mapping: ["REQ_MST_05"]
    
  - id: "TC_MST_005_D"
    scenario: "Negative Control Parity Injection: VIP explicitly inverts TVALIDCHK and TLASTCHK parity models randomly against standard DUT constraints."
    mapping: ["REQ_MST_05"]


  # -> Mapped to REQ_MST_06 (ARESETn Window Injections) - 3 Tests
  - id: "TC_MST_006_A"
    scenario: "Directed Synchronization Reset: VIP forces ARESETn logic synchronously during completely IDLE interface sequences to guarantee non-bleeding initializations."
    mapping: ["REQ_MST_06"]

  - id: "TC_MST_006_B"
    scenario: "Directed Mid-Packet Destruction: While VIP holds TVALID=1/TREADY=0, the VIP synchronously drives ARESETn LOW. Confirm standard DUT reliably drops pipeline cleanly."
    mapping: ["REQ_MST_06"]

  - id: "TC_MST_006_C"
    scenario: "Directed Turnaround Injection: VIP drops ARESETn precisely coincident with a TLAST=1 valid packet culmination, destroying subsequent interlocked cycles."
    mapping: ["REQ_MST_06"]


  # -> Mapped to REQ_MST_07 (TID Multiplexing) - 4 Tests
  - id: "TC_MST_007_A"
    scenario: "Directed Dual-Stream Arbitration: VIP sequentially runs two separate TID threads, crossing segments cleanly without randomizing temporal logic."
    mapping: ["REQ_MST_07"]

  - id: "TC_MST_007_B"
    scenario: "Directed High-Depth Multi-Sequence: Four parallel VIP sequences drive disjoint TID packets into a shared driver. The VIP arbitrates tightly, testing DUT tracking capacity natively."
    mapping: ["REQ_MST_07"]

  - id: "TC_MST_007_C"
    scenario: "Directed Single-Beat Fragmentation: VIP generates 8 independent TID streams but limits sequencer grants to purely single-beat fragments constantly alternating TIDs."
    mapping: ["REQ_MST_07"]

  - id: "TC_MST_007_D"
    scenario: "Directed Cross-Destination Interleaving: VIP sequences maintain matching TIDs but dynamically modulate TDEST headers, forcing distinct structural routing layers passively."
    mapping: ["REQ_MST_07"]


coverage_groups:
  - name: "cg_tvalid_tready_temporal_cross"
    description: "Multi-dimensional coverage cross-referencing TVALID lead times with TREADY hold times across 5 distinct duration bins."
    mapping: ["REQ_MST_01"]

  - name: "cg_packet_boundary_dimensions"
    description: "Coverage bins for packet sizes dynamically constrained by the VIP sequences (single, multi, continuous)."
    mapping: ["REQ_MST_02"]

  - name: "cg_tkeep_tstrb_combinatorial"
    description: "Coverage metric tracking standard bitwise legal interactions against negative fault injections."
    mapping: ["REQ_MST_03"]

  - name: "cg_twakeup_lead_bins"
    description: "Array of tracked intervals validating coverage across all possible pre-transfer timing limits specified in testing."
    mapping: ["REQ_MST_04"]

  - name: "cg_tdatachk_masked_integrity"
    description: "Parity sequence coverage cross-referencing TDATACHK logic states mapped explicitly against TKEEP=0 vector elements."
    mapping: ["REQ_MST_05"]

  - name: "cg_aresetn_asynchronous_window"
    description: "State-machine phase bins where the reset logic was forcefully injected by the VIP."
    mapping: ["REQ_MST_06"]

  - name: "cg_tid_fragmentation_depth"
    description: "Crosses interleaved Stream IDs with maximum consecutive beats, confirming extreme edge permutation boundary interleaving."
    mapping: ["REQ_MST_07"]


interface_signals:
  - name: "ACLK"
    direction: "Input (to VIP Master and DUT Slave)"
    width: "1"
    description: "Global synchronization clock."
  - name: "ARESETn"
    direction: "Input (to VIP Master and DUT Slave)"
    width: "1"
    description: "Active-LOW global reset."
  - name: "TVALID"
    direction: "Output (VIP Master / Transmitter)"
    width: "1"
    description: "Driven by the VIP Master. Indicates a valid transfer payload is present."
  - name: "TREADY"
    direction: "Input (from DUT Slave / Receiver)"
    width: "1"
    description: "Driven by the DUT Slave to signal readiness to accept a transfer."
  - name: "TDATA"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH"
    description: "Primary data payload."
  - name: "TSTRB"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH/8"
    description: "Per-byte data qualifier."
  - name: "TKEEP"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH/8"
    description: "Per-byte position qualifier."
  - name: "TLAST"
    direction: "Output (VIP Master / Transmitter)"
    width: "1"
    description: "Packet-boundary indicator."
  - name: "TID"
    direction: "Output (VIP Master / Transmitter)"
    width: "TID_WIDTH"
    description: "Stream identifier."
  - name: "TDEST"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDEST_WIDTH"
    description: "Routing identifier."
  - name: "TVALIDCHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TVALID."
  - name: "TDATACHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "TDATA_WIDTH/8"
    description: "Odd parity check per byte lane of TDATA."
  - name: "TLASTCHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TLAST."
  - name: "TREADYCHK"
    direction: "Input (from DUT Slave / Receiver, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TREADY, generated by the DUT Slave."

directory_structure:
  root: "axi_stream_master_vip_tb/"
  folders:
    - master_agent: "VIP Master Agent: Sequencer, Driver (drives TVALID/TDATA/TLAST/parity), Monitor"
    - env: "UVM Environment: Scoreboard, Protocol Checker, Coverage Collector, EnvConfig"
    - sequences: "Stimulus library: handshake variants, sparse-stream, back-to-back, null-packet, parity-gen, parity-inject, reset, interleaving, wakeup"
    - tests: "UVM test classes mapping each scenario to sequence combinations and config overrides"
    - assertions: "SVA property file for real-time protocol conformance (stability, reserved-encoding, parity)"
    - top: "Simulation top: DUT (Slave) instantiation, virtual interface binding, clock and reset generation"
    - verif_plan: "Artifacts: YAML traceability matrix, PDF report, sub-prompt reference files"
