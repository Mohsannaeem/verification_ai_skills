test_requirements:
  - id: "REQ_TR_01"
    name: "TVALID Stability After Assertion"
    spec_ref: "Section 2.2, Page 2-18"
    description: |
      A Transmitter (Master DUT) is not permitted to wait until TREADY is asserted before asserting TVALID.
      Once TVALID is asserted, it must remain asserted and all payload signals (TDATA, TSTRB, TKEEP, TLAST, TID, TDEST, TUSER) must remain stable until the handshake occurs.
      Verification Intent: Inject random TREADY stalls via the Slave Agent driver. A protocol assertion in the monitor must fire if TVALID or any sideband changes before the handshake.

  - id: "REQ_TR_02"
    name: "Packet Boundary - TLAST Generation"
    spec_ref: "Section 2.6, Page 2-26"
    description: |
      TLAST marks the final beat of a packet. The number of TLAST assertions must be preserved end-to-end between Transmitter and Receiver.
      Merging of transfers with different TID/TDEST is not permitted once TLAST has been seen.
      Verification Intent: Verify the DUT correctly asserts TLAST on the last beat for single-beat packets, multi-beat packets, and back-to-back packets with no idle gaps.

  - id: "REQ_TR_03"
    name: "TKEEP / TSTRB Byte Qualifier Compliance"
    spec_ref: "Section 2.5, Page 2-24 / Table 2-3"
    description: |
      TKEEP=HIGH, TSTRB=HIGH = Data byte. TKEEP=HIGH, TSTRB=LOW = Position byte.
      TKEEP=LOW, TSTRB=LOW = Null byte. TKEEP=LOW, TSTRB=HIGH is RESERVED and must never be generated.
      Verification Intent: Randomize TKEEP/TSTRB patterns in sequences. An assertion must fire on the reserved combination. The scoreboard reconstructs the stream and checks data byte ordering.

  - id: "REQ_TR_04"
    name: "Reset Exit - TVALID After ARESETn"
    spec_ref: "Section 2.8.2, Page 2-28"
    description: |
      During ARESETn=LOW, the Master must drive TVALID=LOW. The first rising edge of TVALID is only valid at an ACLK edge following the rising edge of ARESETn.
      Verification Intent: Apply reset mid-transfer and verify the DUT deasserts TVALID immediately. Verify that transfers resume correctly only after ARESETn is deasserted and one clock passes.

  - id: "REQ_TR_05"
    name: "AXI5 Parity Generation on All Signals"
    spec_ref: "Chapter 5, Page 5-44 to 5-48 / Table 5-1"
    description: |
      When Check_Type=Odd_Parity_Byte_All (AXI5 only), the Master must generate odd parity on all signals each cycle that the Check Enable condition is met (e.g., TVALIDCHK every cycle ARESETn=1, TDATACHK every cycle TVALID=1).
      Parity must be driven for all bits, including inactive bytes (e.g., TKEEP=0 bytes still require correct TDATACHK).
      Verification Intent: Scoreboard checks all check signals on every valid cycle. Fault injection: force a bit-flip and check DUT does not assert a false parity.

  - id: "REQ_TR_06"
    name: "TWAKEUP Pre-Transfer Assertion (AXI5)"
    spec_ref: "Section 2.3, Page 2-20"
    description: |
      TWAKEUP must be asserted at least one cycle before TVALID. If TWAKEUP and TVALID are both HIGH in the same cycle, TWAKEUP must remain HIGH until TREADY is also HIGH.
      Verification Intent: Verify the DUT asserts TWAKEUP ahead of TVALID. Check that the Slave Agent (with power-aware mode) does not respond to TVALID until TWAKEUP is seen.

  - id: "REQ_TR_07"
    name: "TID/TDEST Transfer Ordering"
    spec_ref: "Section 4.2, Page 4-41"
    description: |
      The AXI-Stream protocol requires that all transfers remain ordered. Reordering is not permitted.
      Interleaving on a per-transfer basis is permitted between different TID/TDEST streams, but must not increase stream count beyond the Receiver's interleaving capability.
      Verification Intent: Monitor logs TID/TDEST per beat. The scoreboard checks in-order delivery for each unique stream identifier.

  - id: "REQ_TR_08"
    name: "Continuous Packets Constraint Mode"
    spec_ref: "Section 3.3, Page 3-38"
    description: |
      When Continuous_Packets=True: TSTRB must not be present; if TLAST=0, all TKEEP bits must be HIGH and TID/TDEST must not change.
      Null bytes are only permitted in the trailing bytes of the last beat (TLAST=1).
      Verification Intent: In continuous-packet test mode, a monitor assertion verifies TID/TDEST lock until TLAST=1 and that no mid-packet null bytes occur.

test_cases:
  - id: "TC_001"
    scenario: "Single-beat packet: Master asserts TVALID with TLAST=1 on the same cycle. Slave TREADY asserted after 0-4 random stall cycles. Verify data integrity and TVALID stability."
    mapping: ["REQ_TR_01", "REQ_TR_02"]

  - id: "TC_002"
    scenario: "Multi-beat packet (N=1 to 256 beats): TVALID held high across all beats. TREADY randomly stalled. TLAST asserted only on final beat. Scoreboard reconstructs and validates whole packet."
    mapping: ["REQ_TR_01", "REQ_TR_02"]

  - id: "TC_003"
    scenario: "Back-to-back packets: TVALID stays HIGH across TLAST boundary (packet N ends, packet N+1 starts next cycle). Verify no gap insertion and correct TLAST framing."
    mapping: ["REQ_TR_02"]

  - id: "TC_004"
    scenario: "TKEEP/TSTRB sparse stream: Randomized TKEEP/TSTRB per beat, including null bytes (TKEEP=0). Assert that reserved combination TKEEP=0/TSTRB=1 never appears."
    mapping: ["REQ_TR_03"]

  - id: "TC_005"
    scenario: "Null packet: TVALID=1, TLAST=1, all TKEEP=0 on first beat. Verify Master drives this correctly and Slave Agent acknowledges without data consumption."
    mapping: ["REQ_TR_02", "REQ_TR_03"]

  - id: "TC_006"
    scenario: "Mid-transfer reset: Assert ARESETn=LOW while TVALID=1, TREADY=1. Verify TVALID drops to 0 immediately. After deassertion, verify TVALID only rises on the next valid ACLK edge."
    mapping: ["REQ_TR_04"]

  - id: "TC_007"
    scenario: "AXI5 Parity - normal traffic: All TVALIDCHK, TDATACHK, TLASTCHK signals verified on every qualifying cycle across 1000+ random beats."
    mapping: ["REQ_TR_05"]

  - id: "TC_008"
    scenario: "AXI5 Parity - inactive bytes: TKEEP=0 on bytes [1] and [3] of 4-byte bus. TDATACHK must still be correct across all bytes including null byte positions."
    mapping: ["REQ_TR_05"]

  - id: "TC_009"
    scenario: "TWAKEUP timing: TWAKEUP asserted exactly 1 cycle before TVALID. Verify Slave Agent waits for TWAKEUP before accepting the transfer."
    mapping: ["REQ_TR_06"]

  - id: "TC_010"
    scenario: "Stream interleaving: Two TID streams (TID=0 and TID=1) interleaved transfer-by-transfer. Scoreboard reconstructs each stream independently and verifies ordering is preserved."
    mapping: ["REQ_TR_07"]

  - id: "TC_011"
    scenario: "Continuous Packets mode: With Continuous_Packets=True, verify TID/TDEST do not change while TLAST=0, and TSTRB is absent from the interface."
    mapping: ["REQ_TR_08"]

coverage_groups:
  - name: "cg_handshake_timing"
    description: "Cross of TVALID raised cycles and TREADY latency (0 to 16 cycles). Ensures all handshake timing variants are exercised."
    mapping: ["REQ_TR_01"]

  - name: "cg_packet_size"
    description: "Bins: 1-beat, 2-4 beats, 5-16 beats, 17-64 beats, 65-256 beats. Includes back-to-back and isolated packet types."
    mapping: ["REQ_TR_02"]

  - name: "cg_tkeep_tstrb_patterns"
    description: "Walking 1s/0s and random combinations on TKEEP/TSTRB. Bins for: all-data, all-null, mixed, position-byte, reserved (must be 0-coverage)."
    mapping: ["REQ_TR_03"]

  - name: "cg_reset_scenarios"
    description: "Bins: reset at idle, reset mid-packet (TVALID=1, TREADY=0), reset during handshake (both=1). Post-reset recovery verified."
    mapping: ["REQ_TR_04"]

  - name: "cg_parity_coverage"
    description: "TDATACHK validation across all byte lanes. Separate bins per byte offset, including zero-TKEEP bytes (inactive bytes that still need correct parity)."
    mapping: ["REQ_TR_05"]

  - name: "cg_twakeup_timing"
    description: "Bins: TWAKEUP 0,1,2,4+ cycles before TVALID; simultaneous TWAKEUP+TVALID."
    mapping: ["REQ_TR_06"]

  - name: "cg_stream_interleaving"
    description: "Number of unique TID values: 1, 2, 4. Interleaving depth (consecutive transfers before switch) bins: 1, 2-8, 9+."
    mapping: ["REQ_TR_07"]

interface_signals:
  - name: "ACLK"
    direction: "Input"
    width: "1"
    description: "Global clock. All signals sampled on rising edge (Section 2.8.1)."

  - name: "ARESETn"
    direction: "Input"
    width: "1"
    description: "Active-LOW reset. Asynchronous assert, synchronous deassert after rising ACLK (Section 2.8.2)."

  - name: "TVALID"
    direction: "Master Output"
    width: "1"
    description: "DUT asserts to indicate valid payload is being driven. Must remain high once asserted until TREADY is seen."

  - name: "TREADY"
    direction: "Master Input"
    width: "1"
    description: "Slave Agent asserts to accept a transfer. Default HIGH if omitted. Used to inject back-pressure in test."

  - name: "TDATA"
    direction: "Master Output"
    width: "TDATA_WIDTH (must be integer x8)"
    description: "Primary data payload. Must be stable while TVALID=1 and TREADY=0."

  - name: "TSTRB"
    direction: "Master Output"
    width: "TDATA_WIDTH/8"
    description: "Per-byte: HIGH=data byte, LOW=position byte. Must be consistent with TKEEP per Table 2-3."

  - name: "TKEEP"
    direction: "Master Output"
    width: "TDATA_WIDTH/8"
    description: "Per-byte: HIGH=must be delivered, LOW=null byte (can be removed). Default HIGH if signal absent."

  - name: "TLAST"
    direction: "Master Output"
    width: "1"
    description: "Packet boundary marker. Asserted on last beat only. Number of assertions must be preserved end-to-end."

  - name: "TID"
    direction: "Master Output"
    width: "TID_WIDTH (rec. <= 8)"
    description: "Stream identifier. Enables per-transfer interleaving when multiple streams share the interface."

  - name: "TDEST"
    direction: "Master Output"
    width: "TDEST_WIDTH (rec. <= 8)"
    description: "Routing identifier. Coarse destination routing information for stream switching."

  - name: "TUSER"
    direction: "Master Output"
    width: "TUSER_WIDTH (rec. integer x TDATA_WIDTH/8)"
    description: "User-defined sideband. Per-byte aligned. Not guaranteed when associated TKEEP=LOW."

  - name: "TWAKEUP"
    direction: "Master Output"
    width: "1"
    description: "AXI5 only. Activity indicator. Must be asserted before TVALID. Requires Wakeup_Signal=True property."

  - name: "TVALIDCHK"
    direction: "Master Output"
    width: "1"
    description: "AXI5 parity. Odd parity over TVALID. Driven every cycle where ARESETn=1."

  - name: "TDATACHK"
    direction: "Master Output"
    width: "TDATA_WIDTH/8"
    description: "AXI5 parity. Odd parity per 8-bit lane of TDATA. Driven every cycle where TVALID=1, including null byte lanes."

  - name: "TLASTCHK"
    direction: "Master Output"
    width: "1"
    description: "AXI5 parity. Odd parity over TLAST. Driven when TVALID=1."

  - name: "TREADYCHK"
    direction: "Slave Output"
    width: "1"
    description: "AXI5 parity. Odd parity over TREADY. Driven by Slave Agent when ARESETn=1."

directory_structure:
  root: "axi_stream_master_vip_tb/"
  folders:
    - agents: "Slave Agent (Driver as responder, Monitor as observer)"
    - env: "UVM Environment (Scoreboard, Protocol Checker)"
    - sequences: "Stimulus sequences: basic, sparse, back-to-back, reset, parity"
    - tests: "UVM Test classes referencing each scenario"
    - top: "TB top with virtual interface and DUT instance"
    - verif_plan: "YAML plan, PDF report, and sub-prompts reference"
