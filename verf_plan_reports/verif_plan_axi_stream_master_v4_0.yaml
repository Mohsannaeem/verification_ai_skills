project: "AXI-Stream Master VIP Verification Plan"
version: "4.0"
verification_role: "Master"
protocol_version: "AXI4/5-Stream (ARM IHI 0051B)"

configurations:
  - feature: "Handshake Protocol"
    name: "TVALID-Driven / TREADY Back-Pressure"
    impact: "The Slave Agent controls TREADY to inject back-pressure; the scoreboard checks that the Master (DUT) never drops TVALID or changes payload before handshake completes (Section 2.2, p.18)."
  - feature: "Packet Framing"
    name: "TLAST Boundary Generation"
    impact: "The Master must assert TLAST on the last beat of every packet. Test scope includes single-beat packets, multi-beat packets, and back-to-back packets (Section 2.6, p.26)."
  - feature: "Byte Qualifiers"
    name: "TKEEP / TSTRB Encoding"
    impact: "TKEEP marks null bytes (can be removed); TSTRB marks position bytes vs data bytes. The scoreboard validates the correct TKEEP/TSTRB combination per beat (Section 2.5, p.24)."
  - feature: "Stream Identification"
    name: "TID / TDEST Routing (Optional, Width-Parameterised)"
    impact: "If TID_WIDTH > 0, the Master may interleave streams. Coverage must bin each unique TID/TDEST pair and verify ordering is preserved (Section 2.7, p.27)."
  - feature: "Sideband Signaling"
    name: "TUSER Pass-through"
    impact: "TUSER is aligned per data byte. The monitor must preserve byte-association across width-conversion paths (Section 2.9, p.29)."
  - feature: "Wakeup Signaling (AXI5)"
    name: "TWAKEUP Pre-TVALID Assertion"
    impact: "TWAKEUP must be asserted before or with TVALID and must stay high until TREADY is seen. Impacts power-aware Slave agent sequencing (Section 2.3, p.20)."
  - feature: "Parity Protection (AXI5)"
    name: "Odd Parity - Check_Type: Odd_Parity_Byte_All"
    impact: "DUT (Master) must generate TDATACHK, TVALIDCHK, TLASTCHK, etc. on every beat. Scoreboard checkers validate parity using Table 5-1 rules (Chapter 5, p.44-48)."
  - feature: "Reset Behavior"
    name: "TVALID LOW during ARESETn"
    impact: "The Master must not assert TVALID until the rising ACLK edge after ARESETn goes HIGH. The driver monitors reset to flag violations (Section 2.8.2, p.28)."
  - feature: "Continuous Packets Mode"
    name: "Continuous_Packets = True"
    impact: "When enabled: no interleaving, no TSTRB, no mid-packet null bytes. TID/TDEST must remain stable while TLAST=0 (Section 3.3, p.38)."

