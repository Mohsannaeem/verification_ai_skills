project: "AXI-Stream Slave DUT Verification Plan — VIP as Master (Transmitter)"
version: "5.0"
verification_role: "Slave"
protocol_version: "AXI4/5-Stream (ARM IHI 0051B, Issue B)"

configurations:
  - feature: "Handshake Protocol"
    name: "Bidirectional Flow Control via TVALID/TREADY"
    impact: |
      The two-way handshake mechanism is the foundational conformance boundary of the
      AXI-Stream interface. The VIP (Master Agent) drives TVALID and payload, while the
      DUT Slave asserts TREADY to admit transfers. Deterministic latency compliance requires
      that the scoreboard detect any sampling anomaly — specifically, data consumption
      occurring outside the coincident HIGH state of both signals.

  - feature: "Packet Framing"
    name: "TLAST Boundary Delineation"
    impact: |
      TLAST acts as the sole explicit packet-boundary indicator. Its assertion count must
      be preserved between Transmitter and Receiver without exception. The DUT's internal
      state machines are expected to flush on TLAST=1; the monitor must reconstruct
      complete datagram sequences and verify that inter-packet state isolation is maintained.

  - feature: "Byte Qualifiers"
    name: "TKEEP / TSTRB Null and Position Byte Encoding"
    impact: |
      TKEEP qualifies bytes for transport (null byte elimination) while TSTRB distinguishes
      data bytes from positional placeholders. The reserved combination (TKEEP=0/TSTRB=1)
      is an illegal stimulus that must be monitored via protocol assertion. Correct Slave
      handling of sparse streams requires byte-level reconstruction fidelity in the scoreboard.

  - feature: "Parity Protection (AXI5)"
    name: "Odd Parity — Check_Type: Odd_Parity_Byte_All"
    impact: |
      The AXI5-Stream parity scheme provides single-bit error detection across all interface
      signals. The VIP Master must generate TDATACHK, TVALIDCHK, and TLASTCHK on every
      qualifying cycle per Table 5-1. The DUT Slave is expected to propagate detection events
      for deliberate fault-injection scenarios, verifying error-containment behavior.

  - feature: "Reset Sequencing"
    name: "ARESETn — Synchronous Deassertion Protocol"
    impact: |
      ARESETn is asserted asynchronously but must be deasserted synchronous to ACLK. The
      DUT Slave must not latch any transfer during ARESETn asserted state and must hold its
      state-machine at the designated IDLE state until the first valid post-reset clock edge.
      Mid-transfer reset injection tests the DUT's ability to suppress in-flight data without
      residual coherency corruption.

  - feature: "Wakeup Signaling (AXI5)"
    name: "TWAKEUP Pre-Transfer Activity Assertion"
    impact: |
      In power-aware topologies, TWAKEUP must be asserted at minimum one cycle before
      TVALID. The Slave is permitted to gate TREADY until TWAKEUP is detected, and doing
      so without deadlock is a key conformance requirement. Verification must exercise both
      the recommended (early) and permissible (simultaneous) wakeup timing windows.

  - feature: "Transfer Interleaving"
    name: "Per-Transfer TID-Indexed Stream Interleaving"
    impact: |
      Interleaving is permitted on a per-transfer granularity across distinct TID/TDEST
      stream identifiers. The DUT Slave must maintain orthogonal stream contexts, ensuring
      that data integrity and ordering are preserved independently for each unique identifier
      pair. Scoreboard stream demultiplexing logic must validate this isolation property.

  - feature: "Continuous Packets Mode"
    name: "Continuous_Packets Property Enforcement"
    impact: |
      When Continuous_Packets=True, the protocol mandates that TSTRB is absent, all
      mid-packet TKEEP bits be HIGH, and TID/TDEST remain stable while TLAST=0. Arbitration
      is constrained to TLAST boundaries. VIP sequences operating in this mode must enforce
      these constraints structurally, and the protocol monitor must flag any mid-packet
      TID mutation as a conformance violation.

