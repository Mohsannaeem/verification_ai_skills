test_requirements:
  - id: "REQ_MST_01"
    name: "TVALID Stability and Handshake Integrity"
    spec_ref: "Section 2.2, Page 2-18"
    description: |
      The AXI-Stream handshake is predicated on the invariant that once a Transmitter asserts
      TVALID, it must hold TVALID HIGH and maintain all associated payload signals (TDATA,
      TSTRB, TKEEP, TLAST, TID, TDEST, TUSER) in a stable state until the handshake completes
      via coincident TREADY assertion. Critically, the Transmitter (VIP Master) is prohibited
      from conditioning TVALID assertion on a prior TREADY observation — doing so would introduce
      a combinatorial dependency that risks deadlock. The only legal TVALID withdrawal point is
      after a completed handshake event.

      Verification Intent: The VIP Master driver must assert TVALID and hold all sideband signals
      with strict stability until TREADY is observed. Randomized protocol assertions on the monitor
      must fire on any mid-handshake TVALID deassertion or payload mutation. Negative-stimulus
      scenarios must inject TVALID drops before TREADY to characterize the DUT Slave's error
      response. All three handshake orderings (TVALID-first, TREADY-first, simultaneous) must be
      driven and binned separately within functional coverage.

  - id: "REQ_MST_02"
    name: "Packet Boundary Generation via TLAST Assertion"
    spec_ref: "Section 2.6, Page 2-26"
    description: |
      TLAST is the exclusive packet-boundary indicator generated by the Transmitter (VIP Master).
      The number of TLAST assertions must be preserved end-to-end between Transmitter and Receiver
      without additional assertions (false boundaries) or suppressions (missed boundaries). The
      start of a packet is implicitly defined as the first transfer of a new TID/TDEST pair after
      reset, or the first transfer following the preceding packet's TLAST assertion for the same
      TID/TDEST. Merging of transfers from different packets (same or different TID/TDEST) is
      architecturally prohibited once TLAST has been observed.

      Verification Intent: VIP sequences must systematically cover: single-beat packets (TLAST=1
      on beat 0), variable-length multi-beat packets (2 to 256 beats), and continuous back-to-back
      packet streams with no idle gap between TLAST=1 and the next TVALID=1. The scoreboard must
      independently reconstruct packet boundaries from the observed TLAST signal and verify that
      the DUT Slave correctly partitions the incoming byte stream at the reconstructed boundaries.

  - id: "REQ_MST_03"
    name: "Byte Qualifier Conformance - TKEEP and TSTRB Encoding"
    spec_ref: "Section 2.5, Page 2-24; Table 2-3, Page 2-25"
    description: |
      TKEEP governs byte transport eligibility: when HIGH, the associated TDATA byte must be
      delivered to the destination; when LOW, the byte is a null byte eligible for removal.
      TSTRB qualifies TKEEP-asserted bytes as either data bytes (TSTRB=1) or positional
      placeholders (TSTRB=0). The combination TKEEP=LOW/TSTRB=HIGH is architecturally reserved
      and constitutes a protocol violation. The relative position of data bytes and position bytes
      within the stream must not change between Transmitter and Receiver, enforcing stream
      positional invariance.

      Verification Intent: The VIP Master must drive all valid TKEEP/TSTRB byte combinations
      under constrained-random stimulus, including fully-packed streams (all TKEEP=1, TSTRB=1),
      sparse configurations with positional bytes, and null-byte-bearing transfers. Dedicated
      negative-stimulus scenarios must inject the reserved encoding (TKEEP=0/TSTRB=1) on
      individual byte lanes. A real-time SVA assertion on the monitor must immediately flag this
      condition. For sparse stream coverage, the scoreboard must perform byte-level reconstruction
      and verify data-byte ordering invariance.

  - id: "REQ_MST_04"
    name: "Null Transfer - Zero Data Bytes with TLAST Assertion"
    spec_ref: "Section 2.6.1, Page 2-26"
    description: |
      The AXI-Stream protocol permits a transfer in which TLAST is asserted but all TKEEP bits
      are deasserted, resulting in a packet that contains no data or position bytes. Such null
      transfers serve specific protocol-level functions: flushing buffers held in intermediate
      pipeline stages, signaling end-of-packet in absence of residual data, or completing an
      end-point operation expecting a terminal TLAST. A null transfer may be merged with an
      earlier transfer if both share TID/TDEST values and the earlier transfer has TLAST
      deasserted.

      Verification Intent: VIP sequences must generate null transfers in three contexts: (a) as
      the sole transfer forming an empty packet, (b) as the terminal transfer of a non-empty
      multi-beat packet, and (c) in back-to-back streams between two non-empty packets. The
      scoreboard must verify that the DUT Slave advances its packet-boundary state machine
      on each null TLAST event without incrementing any data-byte consumption counter.

  - id: "REQ_MST_05"
    name: "Clock and Reset Protocol - TVALID Deassertion During ARESETn"
    spec_ref: "Section 2.8.2, Page 2-28"
    description: |
      ARESETn is an active-LOW global reset signal. It may be asserted asynchronously at any
      point in the interface timeline but must be deasserted synchronous to the rising edge of
      ACLK. The specification mandates that during ARESETn assertion, TVALID must be driven
      LOW. The Transmitter (VIP Master) must not assert TVALID until the first ACLK rising
      edge that follows the deassertion edge of ARESETn. Premature TVALID assertion post-reset
      constitutes a protocol violation that may corrupt the DUT Slave's initialization state.

      Verification Intent: Reset stimulus must be injected across three interface states: (a)
      idle with TVALID already LOW, (b) mid-packet with TVALID=1 and TREADY=0 (back-pressure
      active), and (c) at the precise handshake cycle where TVALID=TREADY=1. The VIP driver
      must drive TVALID LOW within one cycle of ARESETn assertion. Post-reset, compliance
      assertions must verify that the first TVALID rise occurs only on a valid post-reset ACLK
      edge. The DUT Slave's recovery behavior must be captured and scoreboarded.

  - id: "REQ_MST_06"
    name: "AXI5 Parity Generation Across All Check Signals"
    spec_ref: "Chapter 5, Pages 5-44 to 5-48; Table 5-1, Page 5-48"
    description: |
      The AXI5-Stream parity protection scheme employs odd parity across all interface signals
      when Check_Type=Odd_Parity_Byte_All. The VIP Master (Transmitter) must generate
      TVALIDCHK, TDATACHK, TLASTCHK, TIDCHK, TDESTCHK, and TUSERCHK on every cycle where the
      respective Check Enable condition is active. TDATACHK must be driven for all byte lanes
      unconditionally — including lanes where TKEEP=0 — as null-byte lanes still participate
      in parity computation. A check bit for a 1-bit signal (e.g., TVALIDCHK, TLASTCHK) equals
      the logical inversion of that signal per the critical control signal rule.

      Verification Intent: The scoreboard must independently compute expected parity for all
      check signals on every qualifying observation cycle and assert bit-exact equivalence
      against the monitored VIP outputs. Fault injection scenarios must introduce deliberate
      single-bit inversions on specific TDATACHK bit positions to exercise the DUT Slave's
      parity error-detection path. Coverage must bin each distinct check signal independently
      and confirm all byte positions of TDATACHK (including null-byte lanes) are observed.

  - id: "REQ_MST_07"
    name: "TWAKEUP Pre-Transfer Wakeup Signaling Protocol (AXI5)"
    spec_ref: "Section 2.3, Page 2-20"
    description: |
      TWAKEUP is sourced by the Transmitter (VIP Master) and must be glitch-free to enable
      reliable asynchronous capture in a different clock domain, mandating generation from a
      register or glitch-free OR tree. The recommended assertion timing is at least one ACLK
      cycle prior to TVALID. When TWAKEUP and TVALID are simultaneously HIGH, TWAKEUP must
      remain asserted without interruption until TREADY is observed. The DUT Slave is
      architecturally permitted to gate TREADY pending TWAKEUP, creating a canonical deadlock
      scenario if TWAKEUP is never asserted while TVALID is HIGH.

      Verification Intent: Timing distributions to exercise: (a) TWAKEUP preceding TVALID by
      1, 2, and 4 cycles; (b) simultaneous TWAKEUP and TVALID assertion; (c) TWAKEUP assertion
      followed by deasssertion without a subsequent transfer. A deadlock watchdog timer must
      monitor for indefinite TREADY deferral. Coverage must bin all TWAKEUP lead-time
      variations and the simultaneous case explicitly.

  - id: "REQ_MST_08"
    name: "Transfer Ordering and Multi-Stream Interleaving Integrity"
    spec_ref: "Section 4.1, Page 4-40; Section 4.2, Page 4-41"
    description: |
      The AXI-Stream protocol mandates strict intra-stream ordering: reordering of transfers
      within any given TID/TDEST stream is prohibited. Inter-stream interleaving at per-transfer
      granularity is permitted: transfers from distinct TID/TDEST streams may be interleaved on
      a beat-by-beat basis without restriction to TLAST boundaries. The VIP Master must maintain
      independent stream contexts for each active TID value and must not reorder beats within a
      shared stream context. Systems must also ensure that the total interleaving depth does not
      exceed the Receiver's capability, though the protocol does not define a specific maximum.

      Verification Intent: Multi-stream sequences must drive at least two concurrent TID streams
      with transfer-level interleaving at varying depths. The scoreboard must demultiplex
      monitored beats by TID/TDEST and independently verify per-stream ordering invariance.
      Protocol assertions must detect and flag any observable reordering event within a stream.
      Merging correctness must be verified: merges must only occur within matching TID/TDEST
      pairs where the earlier transfer has TLAST deasserted.

test_cases:
  - id: "TC_MST_001"
    scenario: "TVALID-First Handshake: VIP Master asserts TVALID with stable TDATA, TKEEP=0xF, TLAST=0. DUT Slave holds TREADY LOW for 1 to 16 randomized stall cycles then asserts TREADY. Monitor verifies TVALID and all sideband signals are stable across the entire stall window without a single-bit mutation."
    mapping: ["REQ_MST_01"]

  - id: "TC_MST_002"
    scenario: "TREADY-First Handshake: DUT Slave pre-asserts TREADY. VIP Master then asserts TVALID. Transfer must complete in that same clock cycle. Scoreboard verifies no pre-TVALID data sampling event is recorded."
    mapping: ["REQ_MST_01"]

  - id: "TC_MST_003"
    scenario: "Negative - TVALID Drop Under Back-Pressure: VIP injects protocol violation by deasserting TVALID before TREADY is observed. Monitor SVA fires an immediate protocol error. DUT Slave behavior is logged to characterize its error response without deadlock."
    mapping: ["REQ_MST_01"]

  - id: "TC_MST_004"
    scenario: "Single-Beat Packet: VIP drives TVALID=1, TLAST=1, TKEEP=0xFF simultaneously on beat 0. DUT Slave asserts TREADY. Scoreboard verifies TLAST event count increments by one and DUT returns to inter-packet idle state within one cycle of handshake completion."
    mapping: ["REQ_MST_02"]

  - id: "TC_MST_005"
    scenario: "Multi-Beat Packet (N=2 to 256 randomized): VIP drives TVALID=1 continuously across N beats. TLAST=0 for beats 0 to N-2 and TLAST=1 on beat N-1. Randomized TREADY stalls injected. Scoreboard reconstructs the full packet and verifies data integrity."
    mapping: ["REQ_MST_01", "REQ_MST_02"]

  - id: "TC_MST_006"
    scenario: "Back-to-Back Packets: TVALID remains HIGH across the TLAST boundary. The final beat of packet N (TLAST=1) is immediately followed by the first beat of packet N+1 (TLAST=0) with zero idle cycles. Verify the DUT Slave partitions the two packets correctly and does not merge cross-boundary beats."
    mapping: ["REQ_MST_02"]

  - id: "TC_MST_007"
    scenario: "Sparse Byte-Qualifier Stream: VIP drives constrained-random TKEEP and TSTRB per beat including null bytes (TKEEP=0), position bytes (TKEEP=1, TSTRB=0), and data bytes on a 4-byte bus. Scoreboard verifies byte ordering invariance. Monitor asserts that TKEEP=0/TSTRB=1 never appears."
    mapping: ["REQ_MST_03"]

  - id: "TC_MST_008"
    scenario: "Reserved Qualifier Injection (Negative Stimulus): VIP injects TKEEP=0, TSTRB=1 on byte lane 2 of a single beat. Monitor SVA fires a protocol error. DUT Slave response is observed and logged. Verify system remains functional after the violation event."
    mapping: ["REQ_MST_03"]

  - id: "TC_MST_009"
    scenario: "Null Transfer at Packet End: VIP drives a 4-beat data packet followed immediately by a null beat (TVALID=1, TLAST=1, TKEEP=0x0). Scoreboard verifies DUT advances packet-boundary state without crediting data bytes to the null transfer event."
    mapping: ["REQ_MST_04"]

  - id: "TC_MST_010"
    scenario: "Standalone Null Packet: VIP drives TVALID=1, TLAST=1, TKEEP=0x0 as the first and only transfer of a packet. DUT must complete handshake. Scoreboard verifies zero data-byte consumption and correct transition to inter-packet idle."
    mapping: ["REQ_MST_04"]

  - id: "TC_MST_011"
    scenario: "Mid-Transfer Reset: ARESETn driven LOW while VIP has TVALID=1 and DUT TREADY=0. VIP must deassert TVALID within one ACLK cycle. After ARESETn deassertion, verify TVALID is only reasserted at the first valid post-reset ACLK edge."
    mapping: ["REQ_MST_05"]

  - id: "TC_MST_012"
    scenario: "Reset at Handshake Boundary: ARESETn asserted at the exact ACLK edge where TVALID=TREADY=1. Verify the transfer is neither partially sampled nor silently dropped. DUT Slave must return to IDLE and the post-reset first transfer must be correct."
    mapping: ["REQ_MST_05"]

  - id: "TC_MST_013"
    scenario: "AXI5 Parity - Nominal Traffic: VIP drives correct odd parity on TVALIDCHK, TDATACHK, and TLASTCHK for all beats across a 2000-transfer regression run. Scoreboard performs bit-exact independent parity computation and asserts equivalence on every observed cycle."
    mapping: ["REQ_MST_06"]

  - id: "TC_MST_014"
    scenario: "AXI5 Parity - Null Byte Lane Coverage: With TKEEP=0 on byte lanes 1 and 3 of a 4-byte bus, VIP must still generate correct TDATACHK for those inactive lanes. Scoreboard verifies parity is computed for all byte positions regardless of TKEEP state."
    mapping: ["REQ_MST_06"]

  - id: "TC_MST_015"
    scenario: "AXI5 Parity Fault Injection: VIP deliberately inverts bit 1 of TDATACHK on transfer index 99. Verify DUT Slave activates its error-detection path (error flag, interrupt, or protocol assertion) within the cycle of the parity anomaly."
    mapping: ["REQ_MST_06"]

  - id: "TC_MST_016"
    scenario: "TWAKEUP - Recommended Timing: VIP asserts TWAKEUP exactly 2 cycles before TVALID. Verify DUT Slave accepts TREADY assertion within the wakeup latency budget and no deadlock occurs within a 50-cycle watchdog window."
    mapping: ["REQ_MST_07"]

  - id: "TC_MST_017"
    scenario: "Multi-Stream Interleaving: VIP drives two streams (TID=0, TID=1) interleaved at transfer granularity across 64 beats (alternating TID per beat). Scoreboard demultiplexes by TID and independently verifies per-stream ordering invariance and absence of cross-stream data contamination."
    mapping: ["REQ_MST_08"]

coverage_groups:
  - name: "cg_handshake_ordering"
    description: "Three-bin enumerated coverage of handshake ordering: TVALID-first, TREADY-first, simultaneous. Crossed with TREADY stall duration bins: 0, 1-4, 5-16, 17-32 cycles. Must achieve closure across all 12 cross-product cells."
    mapping: ["REQ_MST_01"]

  - name: "cg_packet_size_distribution"
    description: "Packet-length bins: 1 beat, 2-4 beats, 5-32 beats, 33-256 beats. Separate bins for back-to-back and isolated packet categories. Cross with TREADY stall presence (0 stalls vs at least one stall)."
    mapping: ["REQ_MST_02"]

  - name: "cg_tkeep_tstrb_combinations"
    description: "Per-byte lane encoding bins: data byte (TKEEP=1/TSTRB=1), position byte (TKEEP=1/TSTRB=0), null byte (TKEEP=0/TSTRB=0). Negative case (TKEEP=0/TSTRB=1) must appear in negative-stimulus run only (zero coverage in functional runs)."
    mapping: ["REQ_MST_03"]

  - name: "cg_null_transfer_context"
    description: "Null transfer occurrence context bins: standalone null packet, terminal null after data packet, between two data packets. Cross with packet length of the preceding data packet (0, 1-4, 5+ beats)."
    mapping: ["REQ_MST_04"]

  - name: "cg_reset_injection_state"
    description: "Reset injection interface-state bins: (a) idle TVALID=0, (b) mid-packet TVALID=1/TREADY=0, (c) handshake coincidence TVALID=TREADY=1. Cross with ARESETn assertion duration: 1, 2-4, 5+ cycles."
    mapping: ["REQ_MST_05"]

  - name: "cg_parity_check_coverage"
    description: "Per-byte-lane parity check coverage for TDATACHK on 4-byte bus. Active lane bins (TKEEP=1) and inactive lane bins (TKEEP=0) for bytes 0-3. Separate fault-injection bins: individual bit inversions on TDATACHK[3:0]."
    mapping: ["REQ_MST_06"]

  - name: "cg_twakeup_lead_time"
    description: "TWAKEUP lead-time relative to TVALID rising edge. Bins: -1 (post-TVALID, violation scenario), 0 (simultaneous), 1 cycle, 2-4 cycles, 5+ cycles. Cross with TREADY response latency post-TWAKEUP."
    mapping: ["REQ_MST_07"]

  - name: "cg_stream_interleaving"
    description: "Active TID stream count bins: 1, 2, 4. Interleaving granularity (consecutive transfers per TID before stream switch): 1, 2-4, 5-8, 9+. Cross verifies per-stream ordering at maximum interleaving depth."
    mapping: ["REQ_MST_08"]

interface_signals:
  - name: "ACLK"
    direction: "Input (to VIP Master and DUT Slave)"
    width: "1"
    description: "Global synchronization clock. All input signals are sampled on the rising edge of ACLK. All output signal changes must occur after the rising edge of ACLK. (Section 2.8.1, p.28)"

  - name: "ARESETn"
    direction: "Input (to VIP Master and DUT Slave)"
    width: "1"
    description: "Active-LOW global reset. Asynchronous assertion, synchronous deassertion on ACLK rising edge. Mandates TVALID=0 from the VIP Master (Transmitter) for its entire assertion duration. (Section 2.8.2, p.28)"

  - name: "TVALID"
    direction: "Output (VIP Master / Transmitter)"
    width: "1"
    description: "Driven by the VIP Master. Indicates a valid transfer payload is present. Once asserted, must remain HIGH until TREADY is observed. The VIP must not condition TVALID on a prior TREADY observation. (Section 2.2, p.18)"

  - name: "TREADY"
    direction: "Input (from DUT Slave / Receiver)"
    width: "1"
    description: "Driven by the DUT Slave to signal readiness to accept a transfer. The Slave may assert TREADY before or after TVALID. Default value is HIGH if the signal is absent. (Section 3.1.1, p.34)"

  - name: "TDATA"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH (integer x8 bits, recommended 8-1024 bits)"
    description: "Primary data payload. Low-order bytes represent earlier stream bytes. Must remain stable for the full TVALID assertion window prior to handshake completion. (Section 2.4.1, p.21)"

  - name: "TSTRB"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH/8"
    description: "Per-byte qualifier. When HIGH (with TKEEP=1), identifies the associated byte as a data byte. When LOW (with TKEEP=1), identifies the byte as a positional placeholder. (Section 2.5.2, Table 2-3, p.24-25)"

  - name: "TKEEP"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDATA_WIDTH/8"
    description: "Per-byte null-byte qualifier. HIGH indicates the byte must be transported to the destination. LOW indicates a null byte eligible for removal. Default: all-HIGH if absent from interface. (Section 2.5.1, p.24)"

  - name: "TLAST"
    direction: "Output (VIP Master / Transmitter)"
    width: "1"
    description: "Packet-boundary indicator generated by VIP Master. Asserted on the terminal beat of each packet. TLAST assertion count must be preserved without suppression or duplication between Transmitter and Receiver. (Section 2.6, p.26)"

  - name: "TID"
    direction: "Output (VIP Master / Transmitter)"
    width: "TID_WIDTH (recommended <= 8 bits)"
    description: "Stream identifier enabling per-beat multiplexing of independent data streams. All transfers sharing TID and TDEST values belong to the same stream and must be delivered in order. (Section 2.7, p.27)"

  - name: "TDEST"
    direction: "Output (VIP Master / Transmitter)"
    width: "TDEST_WIDTH (recommended <= 8 bits)"
    description: "Routing identifier providing coarse destination addressing for stream-level routing. Merging of transfers with differing TID or TDEST values is prohibited. (Section 2.7, p.27)"

  - name: "TUSER"
    direction: "Output (VIP Master / Transmitter)"
    width: "TUSER_WIDTH (recommended: integer multiple of TDATA_WIDTH/8)"
    description: "User-defined sideband signal, byte-aligned to TDATA. For byte x: TUSER[((x*m)+(m-1)):(x*m)]. Transfer for TUSER bits is not required or guaranteed for bytes where TKEEP=LOW. (Section 2.9, p.29)"

  - name: "TWAKEUP"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "1"
    description: "Activity indicator for power-domain management. Must be glitch-free. Recommended assertion at least one ACLK cycle before TVALID. Must remain HIGH until TREADY when simultaneously asserted with TVALID. (Section 2.3, p.20)"

  - name: "TVALIDCHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TVALID. Check Enable: ARESETn=1. Equal to the logical inversion of TVALID under the critical control signal odd-parity rule. (Table 5-1, p.48)"

  - name: "TDATACHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "TDATA_WIDTH/8"
    description: "Odd parity check per 8-bit byte lane of TDATA. Check Enable: TVALID=1. Must be driven for ALL byte lanes including TKEEP=0 lanes. Bit n covers TDATA[(8n+7):8n]. (Table 5-1, p.48; Section 5.3, p.46)"

  - name: "TLASTCHK"
    direction: "Output (VIP Master / Transmitter, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TLAST. Check Enable: TVALID=1. Equals the logical inversion of TLAST per the critical control signal odd-parity rule. (Table 5-1, p.48)"

  - name: "TREADYCHK"
    direction: "Input (from DUT Slave / Receiver, AXI5-Stream only)"
    width: "1"
    description: "Odd parity check bit for TREADY, generated by the DUT Slave. Check Enable: ARESETn=1. Scoreboard independently verifies this DUT output against the expected odd parity of TREADY. (Table 5-1, p.48)"

directory_structure:
  root: "axi_stream_master_vip_tb/"
  folders:
    - master_agent: "VIP Master Agent: Sequencer, Driver (drives TVALID/TDATA/TLAST/parity), Monitor"
    - env: "UVM Environment: Scoreboard, Protocol Checker, Coverage Collector, EnvConfig"
    - sequences: "Stimulus library: handshake variants, sparse-stream, back-to-back, null-packet, parity-gen, parity-inject, reset, interleaving, wakeup"
    - tests: "UVM test classes mapping each scenario to sequence combinations and config overrides"
    - assertions: "SVA property file for real-time protocol conformance (stability, reserved-encoding, parity)"
    - top: "Simulation top: DUT (Slave) instantiation, virtual interface binding, clock and reset generation"
    - verif_plan: "Artifacts: YAML traceability matrix, PDF report, sub-prompt reference files"
