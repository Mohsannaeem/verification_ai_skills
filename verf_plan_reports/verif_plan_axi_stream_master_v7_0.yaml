project: "AXI-Stream Master VIP Verification Plan"
version: "7.0"
verification_role: "Master"
protocol_version: "AXI4/5-Stream (ARM IHI 0051B, Issue B)"

# Topology Enforcement:
#   Verification Role: MASTER  -> VIP = Master Agent (Transmitter)
#   DUT Rule:          SLAVE   -> DUT = Slave (Receiver)
#   The VIP must drive the primary payload (TDATA, TVALID, etc.)
#   The DUT responds with flow control (TREADY) and generates parity feedback (TREADYCHK).

configurations:
  - feature: "Handshake Protocol"
    name: "TVALID-Driven / TREADY Back-Pressure Flow Control"
    impact: |
      The foundational conformance boundary of AXI-Stream. The VIP Master asserts TVALID
      and holds all payload signals stable until the DUT Slave asserts TREADY. The protocol
      mandates that a Transmitter (VIP) must NOT wait for TREADY before asserting TVALID,
      and once TVALID is HIGH it must not be deasserted until the handshake occurs. The DUT
      Slave is permitted to assert TREADY before or after TVALID, enabling all three canonical
      handshake orderings. (Section 2.2, p.18)

  - feature: "Packet Framing"
    name: "TLAST Packet-Boundary Event Generation"
    impact: |
      TLAST is the sole packet-boundary indicator sourced from the VIP Master (Transmitter).
      The assertion count must be preserved between Transmitter and Receiver without
      exception. The VIP must correctly assert TLAST on the terminal beat of every packet
      and must not re-assert TLAST within a packet. Incorrect TLAST generation may corrupt
      DUT Slave state machines that use TLAST for buffer-drain triggering or arbitration
      change-points. (Section 2.6, p.26)

  - feature: "Byte-Level Stream Semantics"
    name: "TKEEP / TSTRB Qualifier-Driven Stream Typing"
    impact: |
      TKEEP qualifies bytes for network transport, enabling null byte insertion and removal.
      TSTRB distinguishes data bytes from position bytes within a sparse stream. The VIP
      must never drive the architecturally reserved encoding TKEEP=0/TSTRB=1. Correct
      qualifier encoding ensures the DUT Slave's data-reconstruction path receives an
      accurately typed byte stream. The scoreboard must independently reconstruct the
      expected stream and verify the DUT's output. (Section 2.5, Table 2-3, p.24-25)

  - feature: "Reset Sequencing"
    name: "ARESETn Synchronous Deassertion with Transmitter TVALID Compliance"
    impact: |
      ARESETn may be asserted asynchronously at any time but must be deasserted synchronous
      to ACLK. During reset assertion, the VIP Master must unconditionally drive TVALID LOW.
      Furthermore, the first TVALID assertion post-reset is only architecturally valid at an
      ACLK rising edge that follows the rising edge of ARESETn. Mid-transfer reset injection
      by the test bench exercises the DUT Slave's ability to suppress in-flight data and
      return to IDLE without coherency corruption. (Section 2.8.2, p.28)

  - feature: "Wakeup Signaling (AXI5)"
    name: "TWAKEUP Pre-Transfer Activity Indicator"
    impact: |
      The VIP Master (Transmitter) must assert TWAKEUP at least one ACLK cycle before
      TVALID. If TWAKEUP and TVALID are simultaneously HIGH, TWAKEUP must remain asserted
      until TREADY is seen. The DUT Slave is architecturally permitted to defer TREADY until
      TWAKEUP is observed, creating a potential deadlock condition if TWAKEUP is omitted.
      TWAKEUP must be glitch-free, generated from a register or glitch-free OR tree. (Section 2.3, p.20)

  - feature: "Stream Identification"
    name: "TID / TDEST Indexed Stream Multiplexing"
    impact: |
      TID provides per-beat stream identification enabling transfer-level interleaving across
      coexistent streams. TDEST provides coarse routing metadata for fabric-based stream
      switching. Transfers sharing TID and TDEST belong to the same stream; merging of
      transfers from different streams is prohibited. The VIP must maintain deterministic
      ordering within each TID/TDEST pair and never merge beats from different stream
      contexts. (Section 2.7, p.27; Section 4.2, p.41)

  - feature: "Parity Protection (AXI5)"
    name: "Odd Parity Generation - Check_Type: Odd_Parity_Byte_All"
    impact: |
      When Check_Type=Odd_Parity_Byte_All, the VIP Master (Transmitter) must generate odd
      parity on all applicable check signals. Parity is driven on every cycle where the
      associated Check Enable condition is met. Critically, TDATACHK must be driven for ALL
      byte lanes including lanes where TKEEP=0 (null bytes). Single-bit error injection
      scenarios verify the DUT Slave's fault-detection mechanism. (Chapter 5, p.44-48)

  - feature: "Continuous Packets Mode"
    name: "Continuous_Packets Protocol Constraint Enforcement"
    impact: |
      When Continuous_Packets=True, the VIP must enforce: absence of TSTRB, all TKEEP bits
      HIGH while TLAST=0, no TID/TDEST mutation mid-packet, and no inter-packet idle gaps.
      The protocol monitor must assert on any mid-packet TID change or null byte in this mode.
      This constraint ensures compatibility with Slave-side interconnect that relies on
      packet continuity for arbitration efficiency. (Section 3.3, p.38)

