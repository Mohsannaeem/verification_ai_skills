project: "AXI-Stream Master VIP Verification Plan"
version: "9.0"
verification_role: "Master"
protocol_version: "AXI4/5-Stream (ARM IHI 0051B, Issue B)"

configurations:
  - feature: "Handshake Protocol"
    name: "TVALID_TREADY_Async_Handshake"
    impact: |
      Functionality impact: Forces pipeline stalling and dictates stability bounds for the entire payload vector. 
      Performance impact: dictates maximum theoretical throughput in scenarios involving combinatorial TREADY backpressure.

  - feature: "Packet Framing"
    name: "TLAST_Packet_Framing_Support"
    impact: |
      Functionality impact: Requires end-to-end exact reconstruction of packet boundary assertions to govern data routing layer and destination buffers. 
      Performance impact: dictates fragmentation penalties and dynamic arbitration thresholds.

  - feature: "Byte-Level Stream Semantics"
    name: "TKEEP_TSTRB_Qualifier_Encoding"
    impact: |
      Functionality impact: necessitates robust reconstruction algorithms in the scoreboard to extract physical data while discarding positional or null bytes. 
      Performance impact: alters actual byte-consumption rate compared to clock-cycle metrics.

  - feature: "Reset Sequencing"
    name: "ARESETn_Mid_Transfer_Isolation"
    impact: |
      Functionality impact: compels the testing environment to trigger state-machine destruction mid-transfer. 
      Verification constraint: requires the VIP driver to safely discard tracking state and the monitor to correctly sequence clean IDLE resets asynchronously.

  - feature: "Wakeup Signaling (AXI5)"
    name: "TWAKEUP_Pre_Transfer_Signaling"
    impact: |
      Functionality impact: introduces an external deadlock dependency if TWAKEUP assertion lags TVALID assertion. 
      Performance impact: latency models must explicitly adjust for TWAKEUP lead times before TREADY is physically accessible.

  - feature: "Stream Identification"
    name: "TID_TDEST_Interleaving_Routing"
    impact: |
      Functionality impact: forces the scoreboard multiplexer logic to concurrently maintain dynamically allocated data streams to track ordering compliance. 
      Performance impact: tests the DUT buffer saturation across varying interleave depths.

  - feature: "Parity Protection (AXI5)"
    name: "Odd_Parity_Check_Generation"
    impact: |
      Functionality impact: requires single-bit error injection capabilities within the VIP transmission chain to exercise the DUT standard error logic. 
      Verification constraint: the monitor must passively track hardware parity matrices parallel to the native data payload across all TKEEP permutations.

  - feature: "Continuous Packets Mode"
    name: "Continuous_Packet_Constraint_Mode"
    impact: |
      Functionality impact: strictly constrains the randomization matrices of the VIP to avoid null-byte and inter-packet gaps. 
      Performance impact: maximizes arbitration efficiency and validates peak continuous payload saturation without recovery cycles.

