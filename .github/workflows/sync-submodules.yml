name: Sync Submodules

# Bumps the axi_stream_uvc submodule pointer in this repo whenever the
# sub-repo's main branch advances beyond the currently pinned commit.
#
# Triggers:
#   - Daily at 19:30 UTC (30 min after subrepo-prs, midnight PKT + 30 min)
#   - Manual via workflow_dispatch
#   - Optionally: repository_dispatch from axi_stream_uvc CI
#       (axi_stream_uvc can call: gh api repos/Mohsannaeem/verification_ai_skills
#        /dispatches -f event_type=submodule-updated)
#
# Secret required: EDA_BUDDY_PAT
#   Fine-grained PAT with Contents (read+write) on verification_ai_skills
#   and Contents (read) on axi_stream_uvc.

on:
  schedule:
    - cron: '30 19 * * *'   # 19:30 UTC = 00:30 PKT

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual sync'
        required: false
        default: 'Manual trigger'

  repository_dispatch:
    types: [submodule-updated]

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  sync-axi-stream-uvc:
    name: Bump uvc/axi_stream_uvc to latest main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verification_ai_skills with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.EDA_BUDDY_PAT }}
          submodules: true
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check current vs remote submodule SHA
        id: check
        run: |
          CURRENT=$(git -C uvc/axi_stream_uvc rev-parse HEAD)
          REMOTE=$(git ls-remote git@github.com:Mohsannaeem/axi_stream_uvc.git HEAD \
                   | awk '{print $1}')
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "remote=${REMOTE}"   >> "$GITHUB_OUTPUT"
          echo "Pinned : ${CURRENT}"
          echo "Remote : ${REMOTE}"
          if [ "$CURRENT" = "$REMOTE" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update submodule pointer
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git submodule update --remote uvc/axi_stream_uvc
          NEW_SHA=$(git -C uvc/axi_stream_uvc rev-parse HEAD)
          SHORT=${NEW_SHA:0:7}
          git add uvc/axi_stream_uvc
          git commit -m "chore: bump axi_stream_uvc submodule to ${SHORT}

          Auto-updated by sync-submodules workflow.
          Previous: ${{ steps.check.outputs.current }}
          New:      ${NEW_SHA}"
          git push origin main
          echo "Submodule bumped to ${NEW_SHA}"

      - name: No update needed
        if: steps.check.outputs.up_to_date == 'true'
        run: echo "uvc/axi_stream_uvc is already pinned to the latest main — nothing to do."
