name: Sync Dummy UVM

# Triggers:
#   1. Push to main/master when anything under dummy_uvm/ changes
#   2. Manual trigger from the GitHub Actions UI (workflow_dispatch)
#
# What it does:
#   - Syncs dummy_uvm/ into the `dev` branch of Mohsannaeem/dummy_uvm
#   - Commits accumulate on `dev` — open a PR to master manually when ready to release
#
# Setup (one-time):
#   Uses the same EDA_BUDDY_PAT secret — add Contents (read+write) permission
#   for the dummy_uvm repo to the existing PAT, or create a separate secret.

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'dummy_uvm/**'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual sync'
        required: false
        default: 'Manual sync triggered'

jobs:
  sync:
    name: Sync to dummy_uvm dev branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (verification_ai_skills)
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout dummy_uvm standalone repo (dev branch)
        uses: actions/checkout@v5
        with:
          repository: Mohsannaeem/dummy_uvm
          token: ${{ secrets.EDA_BUDDY_PAT }}
          ref: dev
          path: dummy_uvm_repo

      - name: Sync dummy_uvm/ contents
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            source/dummy_uvm/ dummy_uvm_repo/

      - name: Stage changes and check for differences
        id: diff
        run: |
          cd dummy_uvm_repo
          git add -A
          if git diff --staged --quiet; then
            echo "no_changes=true"  >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if nothing changed
        if: steps.diff.outputs.no_changes == 'true'
        run: echo "No changes detected — dev branch is already up to date."

      - name: Commit and push to dev
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          cd dummy_uvm_repo

          SOURCE_COMMIT="${{ github.sha }}"
          SOURCE_MSG="${{ github.event.head_commit.message || github.event.inputs.reason }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "sync: ${SOURCE_MSG} (${SOURCE_COMMIT:0:7})"
          git push origin dev
