name: Sync EDA Buddy

# Triggers:
#   1. Push to main/master when anything under eda_buddy/ changes
#   2. Manual trigger from the GitHub Actions UI (workflow_dispatch)
#
# What it does:
#   - Syncs eda_buddy/ into the `dev` branch of Mohsannaeem/eda_buddy
#   - Commits accumulate on `dev` — open a PR to main manually when ready to release
#
# Setup (one-time):
#   1. Create a GitHub Personal Access Token (PAT):
#      GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
#      Permissions needed: Contents (read+write) on eda_buddy repo
#   2. Add the PAT as a secret in THIS repo:
#      Settings → Secrets and variables → Actions → New secret
#      Name: EDA_BUDDY_PAT   Value: <your PAT>

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'eda_buddy/**'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual sync'
        required: false
        default: 'Manual sync triggered'

jobs:
  sync:
    name: Sync to eda_buddy dev branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (verification_ai_skills)
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout eda_buddy standalone repo (dev branch)
        uses: actions/checkout@v5
        with:
          repository: Mohsannaeem/eda_buddy
          token: ${{ secrets.EDA_BUDDY_PAT }}
          ref: dev
          path: eda_buddy_repo

      - name: Sync eda_buddy/ contents
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='project_structure.yaml' \
            source/eda_buddy/ eda_buddy_repo/
          # project_structure.yaml is machine-specific — push the template from examples/ instead
          cp source/eda_buddy/examples/project_structure.yaml eda_buddy_repo/project_structure.yaml

      - name: Stage changes and check for differences
        id: diff
        run: |
          cd eda_buddy_repo
          git add -A
          if git diff --staged --quiet; then
            echo "no_changes=true"  >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if nothing changed
        if: steps.diff.outputs.no_changes == 'true'
        run: echo "No changes detected — dev branch is already up to date."

      - name: Commit and push to dev
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          cd eda_buddy_repo

          SOURCE_COMMIT="${{ github.sha }}"
          SOURCE_MSG="${{ github.event.head_commit.message || github.event.inputs.reason }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "sync: ${SOURCE_MSG} (${SOURCE_COMMIT:0:7})"
          git push origin dev
