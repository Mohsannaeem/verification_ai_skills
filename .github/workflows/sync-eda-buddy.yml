name: Sync EDA Buddy

# Triggers:
#   1. Push to main/master when anything under eda_buddy/ changes
#   2. Manual trigger from the GitHub Actions UI (workflow_dispatch)
#
# What it does:
#   - Copies eda_buddy/ from this repo into a new branch on Mohsannaeem/eda_buddy
#   - Opens a Pull Request for review before the changes land on main
#
# Setup (one-time):
#   1. Create a GitHub Personal Access Token (PAT):
#      GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
#      Permissions needed: Contents (read+write) and Pull requests (read+write) on eda_buddy repo
#   2. Add the PAT as a secret in THIS repo:
#      Settings → Secrets and variables → Actions → New secret
#      Name: EDA_BUDDY_PAT   Value: <your PAT>

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'eda_buddy/**'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual sync'
        required: false
        default: 'Manual sync triggered'

jobs:
  sync:
    name: Sync to eda_buddy repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (verification_ai_skills)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout eda_buddy standalone repo
        uses: actions/checkout@v4
        with:
          repository: Mohsannaeem/eda_buddy
          token: ${{ secrets.EDA_BUDDY_PAT }}
          path: eda_buddy_repo

      - name: Sync eda_buddy/ contents
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            source/eda_buddy/ eda_buddy_repo/

      - name: Check for changes
        id: diff
        run: |
          cd eda_buddy_repo
          git diff --quiet && git diff --staged --quiet && echo "no_changes=true" >> $GITHUB_OUTPUT || echo "no_changes=false" >> $GITHUB_OUTPUT

      - name: Skip if nothing changed
        if: steps.diff.outputs.no_changes == 'true'
        run: echo "No changes detected in eda_buddy/ — skipping PR creation."

      - name: Create branch and open PR
        if: steps.diff.outputs.no_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.EDA_BUDDY_PAT }}
        run: |
          cd eda_buddy_repo

          BRANCH="sync/$(date +%Y-%m-%d-%H%M%S)"
          SOURCE_COMMIT="${{ github.sha }}"
          SOURCE_MSG="${{ github.event.head_commit.message || github.event.inputs.reason }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "sync: update from verification_ai_skills @ ${SOURCE_COMMIT:0:7}

          Source commit : ${SOURCE_COMMIT}
          Commit message: ${SOURCE_MSG}"

          git push origin "$BRANCH"

          gh pr create \
            --title "sync: EDA Buddy update $(date +%Y-%m-%d)" \
            --body "## Automated sync from \`verification_ai_skills\`

          | Field | Value |
          |---|---|
          | Source repo | \`Mohsannaeem/verification_ai_skills\` |
          | Source commit | \`${SOURCE_COMMIT:0:7}\` |
          | Commit message | ${SOURCE_MSG} |
          | Synced at | $(date -u '+%Y-%m-%d %H:%M UTC') |

          ### Review checklist
          - [ ] README is up to date
          - [ ] Example YAMLs reflect current schema
          - [ ] No project-specific paths leaked into scripts
          - [ ] \`requirements.txt\` is current

          > This PR was opened automatically. Merge when ready." \
            --base main \
            --head "$BRANCH"
