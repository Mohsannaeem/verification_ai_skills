name: Sync Sub-Repositories

# Syncs sub-folders of this repo into their standalone repositories.
#
# Sub-repos managed:
#   eda_buddy/  →  github.com/Mohsannaeem/eda_buddy    (branch: dev → main)
#   dummy_uvm/  →  github.com/Mohsannaeem/dummy_uvm    (branch: dev → master)
#
# Triggers:
#   - Daily at 19:00 UTC (midnight Pakistan Standard Time)
#   - Manual via workflow_dispatch (syncs all sub-repos at once)
#
# PR behaviour:
#   - If a PR from dev already exists → just push more commits (PR auto-updates)
#   - If no open PR exists           → create one
#
# Secret required: EDA_BUDDY_PAT
#   Fine-grained PAT with Contents (read+write) on both eda_buddy and dummy_uvm repos.

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = midnight PKT daily

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual sync'
        required: false
        default: 'Manual sync'

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  sync-eda-buddy:
    name: Sync → eda_buddy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout verification_ai_skills
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout eda_buddy (dev branch)
        uses: actions/checkout@v5
        with:
          repository: Mohsannaeem/eda_buddy
          token: ${{ secrets.EDA_BUDDY_PAT }}
          ref: dev
          path: eda_buddy_repo

      - name: Sync files
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='project_structure.yaml' \
            source/eda_buddy/ eda_buddy_repo/
          cp source/eda_buddy/examples/project_structure.yaml eda_buddy_repo/project_structure.yaml

      - name: Commit and push to dev
        id: push
        run: |
          cd eda_buddy_repo
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes — eda_buddy dev is already up to date."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            SHA="${{ github.sha }}"
            MSG="${{ github.event.head_commit.message || github.event.inputs.reason || 'scheduled daily sync' }}"
            git commit -m "sync: ${MSG} (${SHA:0:7})"
            git push origin dev
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR (or skip if one already exists)
        if: steps.push.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.EDA_BUDDY_PAT }}
        run: |
          EXISTING=$(gh pr list \
            --repo Mohsannaeem/eda_buddy \
            --state open --base main --head dev \
            --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — new commits pushed to dev, PR auto-updated."
          else
            gh pr create \
              --repo Mohsannaeem/eda_buddy \
              --title "release: EDA Buddy $(date +'%Y-%m-%d')" \
              --body "## EDA Buddy — Sync from \`verification_ai_skills\`

          Accumulated changes from the \`eda_buddy/\` sub-folder.
          Review and merge to \`main\` when ready to publish.

          | | |
          |---|---|
          | Source | \`Mohsannaeem/verification_ai_skills\` |
          | Synced at | $(date -u +'%Y-%m-%d %H:%M UTC') |
          | Trigger | ${{ github.event_name }} |

          ### Checklist
          - [ ] README is accurate
          - [ ] Example YAMLs match current schema
          - [ ] No project-specific paths in scripts
          - [ ] \`requirements.txt\` is up to date" \
              --base main \
              --head dev
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  sync-dummy-uvm:
    name: Sync → dummy_uvm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout verification_ai_skills
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout dummy_uvm (dev branch)
        uses: actions/checkout@v5
        with:
          repository: Mohsannaeem/dummy_uvm
          token: ${{ secrets.EDA_BUDDY_PAT }}
          ref: dev
          path: dummy_uvm_repo

      - name: Sync files
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            source/dummy_uvm/ dummy_uvm_repo/

      - name: Commit and push to dev
        id: push
        run: |
          cd dummy_uvm_repo
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes — dummy_uvm dev is already up to date."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            SHA="${{ github.sha }}"
            MSG="${{ github.event.head_commit.message || github.event.inputs.reason || 'scheduled daily sync' }}"
            git commit -m "sync: ${MSG} (${SHA:0:7})"
            git push origin dev
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR (or skip if one already exists)
        if: steps.push.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.EDA_BUDDY_PAT }}
        run: |
          EXISTING=$(gh pr list \
            --repo Mohsannaeem/dummy_uvm \
            --state open --base master --head dev \
            --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — new commits pushed to dev, PR auto-updated."
          else
            gh pr create \
              --repo Mohsannaeem/dummy_uvm \
              --title "release: Dummy UVM $(date +'%Y-%m-%d')" \
              --body "## Dummy UVM — Sync from \`verification_ai_skills\`

          Accumulated changes from the \`dummy_uvm/\` sub-folder.
          Review and merge to \`master\` when ready to publish.

          | | |
          |---|---|
          | Source | \`Mohsannaeem/verification_ai_skills\` |
          | Synced at | $(date -u +'%Y-%m-%d %H:%M UTC') |
          | Trigger | ${{ github.event_name }} |" \
              --base master \
              --head dev
          fi
