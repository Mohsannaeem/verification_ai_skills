name: Sub-Repo Pull Requests

# Creates PRs from dev → main (or dev → master) on each sub-repo when
# dev has new commits. If a PR already exists it is left open.
# Skips gracefully when a sub-repo has no dev branch.
#
# Triggers:
#   - Daily at 19:00 UTC (midnight Pakistan Standard Time)
#   - Manual via workflow_dispatch
#
# Secret required: EDA_BUDDY_PAT
#   Fine-grained PAT with Contents + Pull requests (read+write)
#   on eda_buddy, dummy_uvm, and axi_stream_uvc repos.

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = midnight PKT

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual PR creation'
        required: false
        default: 'Manual trigger'

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  pr-eda-buddy:
    name: PR → eda_buddy (dev → main)
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if dev is ahead of main
        env:
          GH_TOKEN: ${{ secrets.EDA_BUDDY_PAT }}
        run: |
          DEV_EXISTS=$(gh api repos/Mohsannaeem/eda_buddy/branches \
            --jq '[.[] | select(.name=="dev")] | length')

          if [ "$DEV_EXISTS" = "0" ]; then
            echo "No dev branch in eda_buddy — skipping."
            exit 0
          fi

          AHEAD=$(gh api repos/Mohsannaeem/eda_buddy/compare/main...dev \
            --jq '.ahead_by')
          echo "eda_buddy: dev is ${AHEAD} commit(s) ahead of main"

          if [ "$AHEAD" = "0" ]; then
            echo "Nothing to do — dev is up to date with main."
            exit 0
          fi

          EXISTING=$(gh pr list \
            --repo Mohsannaeem/eda_buddy \
            --state open --base main --head dev \
            --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — ${AHEAD} commit(s) pending review."
          else
            gh pr create \
              --repo Mohsannaeem/eda_buddy \
              --title "release: EDA Buddy $(date +'%Y-%m-%d')" \
              --body "## EDA Buddy — dev → main

          ${AHEAD} commit(s) on \`dev\` ready for release.

          | | |
          |---|---|
          | Triggered by | ${{ github.event_name }} |
          | Created at   | $(date -u +'%Y-%m-%d %H:%M UTC') |

          ### Checklist
          - [ ] README is accurate
          - [ ] Example YAMLs match current schema
          - [ ] \`requirements.txt\` is up to date
          - [ ] No machine-specific paths in scripts" \
              --base main \
              --head dev
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  pr-dummy-uvm:
    name: PR → dummy_uvm (dev → master)
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if dev is ahead of master
        env:
          GH_TOKEN: ${{ secrets.EDA_BUDDY_PAT }}
        run: |
          DEV_EXISTS=$(gh api repos/Mohsannaeem/dummy_uvm/branches \
            --jq '[.[] | select(.name=="dev")] | length')

          if [ "$DEV_EXISTS" = "0" ]; then
            echo "No dev branch in dummy_uvm — skipping."
            exit 0
          fi

          AHEAD=$(gh api repos/Mohsannaeem/dummy_uvm/compare/master...dev \
            --jq '.ahead_by')
          echo "dummy_uvm: dev is ${AHEAD} commit(s) ahead of master"

          if [ "$AHEAD" = "0" ]; then
            echo "Nothing to do — dev is up to date with master."
            exit 0
          fi

          EXISTING=$(gh pr list \
            --repo Mohsannaeem/dummy_uvm \
            --state open --base master --head dev \
            --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — ${AHEAD} commit(s) pending review."
          else
            gh pr create \
              --repo Mohsannaeem/dummy_uvm \
              --title "release: Dummy UVM $(date +'%Y-%m-%d')" \
              --body "## Dummy UVM — dev → master

          ${AHEAD} commit(s) on \`dev\` ready for release.

          | | |
          |---|---|
          | Triggered by | ${{ github.event_name }} |
          | Created at   | $(date -u +'%Y-%m-%d %H:%M UTC') |

          ### Checklist
          - [ ] UVM templates compile cleanly
          - [ ] No machine-specific paths in template files" \
              --base master \
              --head dev
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  pr-axi-stream-uvc:
    name: PR → axi_stream_uvc (dev → main)
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if dev is ahead of main
        env:
          GH_TOKEN: ${{ secrets.EDA_BUDDY_PAT }}
        run: |
          DEV_EXISTS=$(gh api repos/Mohsannaeem/axi_stream_uvc/branches \
            --jq '[.[] | select(.name=="dev")] | length')

          if [ "$DEV_EXISTS" = "0" ]; then
            echo "No dev branch in axi_stream_uvc — skipping."
            exit 0
          fi

          AHEAD=$(gh api repos/Mohsannaeem/axi_stream_uvc/compare/main...dev \
            --jq '.ahead_by')
          echo "axi_stream_uvc: dev is ${AHEAD} commit(s) ahead of main"

          if [ "$AHEAD" = "0" ]; then
            echo "Nothing to do — dev is up to date with main."
            exit 0
          fi

          EXISTING=$(gh pr list \
            --repo Mohsannaeem/axi_stream_uvc \
            --state open --base main --head dev \
            --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — ${AHEAD} commit(s) pending review."
          else
            gh pr create \
              --repo Mohsannaeem/axi_stream_uvc \
              --title "release: AXI-Stream UVC $(date +'%Y-%m-%d')" \
              --body "## AXI-Stream UVC — dev → main

          ${AHEAD} commit(s) on \`dev\` ready for release.

          | | |
          |---|---|
          | Triggered by | ${{ github.event_name }} |
          | Created at   | $(date -u +'%Y-%m-%d %H:%M UTC') |

          ### Checklist
          - [ ] CI passes on dev (filelist validation, YAML lint, Makefile portability)
          - [ ] \`sim/Makefile\` contains no hardcoded absolute paths
          - [ ] Both VIP test counts are correct (Master: 48, Slave: 46)
          - [ ] \`README.md\` reflects any new test targets" \
              --base main \
              --head dev
          fi
