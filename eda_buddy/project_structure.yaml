# EDA Buddy Project Structure — SMART_SOC_PROJECT
# This file is machine-specific and excluded from the standalone eda_buddy repo.
# For a shareable template see examples/project_structure.yaml

project_name: SMART_SOC_PROJECT

paths:
  root:      D:/Verification/VERIFICATION_PLANNER/run
  filelists: filelists    # relative to root → root/filelists/
  makefile:  .            # relative to root → root/Makefile

# Global hooks — run before/after EVERY build and sim job across all components.
# Leave blank to skip. Value is any shell command or path to a script.
hooks:
  pre:  ""
  post: ""

components:
- name: axi_stream_master_vip
  build_cfg:   d:/Verification/VERIFICATION_PLANNER/Output/axi_stream_master_vip_tb/yamls/axi_stream_master_build.yaml
  runtime_cfg: d:/Verification/VERIFICATION_PLANNER/Output/axi_stream_master_vip_tb/yamls/axi_stream_master_run.yaml
- name: axi_stream_slave_vip
  build_cfg:   d:/Verification/VERIFICATION_PLANNER/Output/axi_stream_slave_vip_tb/yamls/axi_stream_slave_vip_build.yaml
  runtime_cfg: d:/Verification/VERIFICATION_PLANNER/Output/axi_stream_slave_vip_tb/yamls/axi_stream_slave_vip_run.yaml
