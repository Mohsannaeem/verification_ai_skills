# EDA Buddy Project Structure — template
# Copy this file to eda_buddy/project_structure.yaml and fill in your paths.
# Then run: python eda_buddy.py --gen-makefile

project_name: MY_PROJECT

paths:
  root:      /path/to/your/run         # ALL generated artifacts go here
  filelists: filelists                  # relative to root
  makefile:  .                          # relative to root (. = root itself)

# Global hooks — run before/after EVERY build and simulation across all components.
# Leave blank ("") to skip.
hooks:
  pre:  ""                              # e.g. "source /tools/questa_2023/setup.sh"
  post: ""

components:
- name: my_vip
  build_cfg:   /path/to/tb/yamls/build.yaml
  runtime_cfg: /path/to/tb/yamls/run.yaml

# Add more components:
# - name: my_second_vip
#   build_cfg:   /path/to/second/yamls/build.yaml
#   runtime_cfg: /path/to/second/yamls/run.yaml
